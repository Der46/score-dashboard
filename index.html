<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>每週成績總覽</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <script src="./js/app.js" defer></script>
</head>

<body>
    <div class="ambient" aria-hidden="true">
        <div class="orb one"></div>
        <div class="orb two"></div>
        <div class="orb three"></div>
    </div>

    <main class="page">
        <section class="hero">
            <div class="hero-inner">
                <div class="hero-content">
                    <div class="hero-title-block">
                        <div class="eyebrow">
                            <span class="status-dot"></span>
                            Weekly Score Dashboard
                        </div>

                        <h1>Coin999-長長久久 隊伍 每週成績總覽</h1>

                        <p class="hero-subtitle">
                            檢視每週活動分數、與上週比較，以及本月最後五名。
                        </p>
                    </div>

                    <div class="hero-actions">
                        <div class="select-wrap">
                            <select id="weekSelect" aria-label="選擇週別"></select>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="stats" id="stats"></section>

        <section class="panel">
            <div class="toolbar">
                <div class="toolbar-left">
                    <div class="input-wrap">
                        <input class="search" id="searchInput" type="search" placeholder="搜尋 CM..." />
                    </div>

                    <div class="select-wrap">
                        <select id="statusFilter" aria-label="篩選狀態">
                            <option value="全部">全部狀態</option>
                        </select>
                    </div>
                </div>

                <div class="toolbar-right">
                    <span class="hint" id="resultHint">載入中...</span>
                </div>
            </div>

            <div class="table-wrap">
                <table>
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <section class="profile-modal" id="profileModal" hidden aria-modal="true" role="dialog"
        aria-labelledby="profileName">
        <div class="profile-backdrop" data-profile-close></div>

        <article class="profile-dialog">
            <header class="profile-head">
                <div>
                    <div class="profile-kicker">Member Analytics</div>
                    <h2 class="profile-title" id="profileName">成員資料</h2>
                    <div class="profile-meta" id="profileMeta">載入中...</div>
                </div>

                <button class="profile-close" id="profileClose" type="button" aria-label="關閉個人資料">×</button>
            </header>

            <div class="profile-body" id="profileBody">
                <div class="profile-loading">資料分析中...</div>
            </div>
        </article>
    </section>



</body>

</html>
