<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="page.title">每週成績總覽</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <script src="./js/app.js" defer></script>
</head>

<body>
    <div class="ambient" aria-hidden="true">
        <div class="orb one"></div>
        <div class="orb two"></div>
        <div class="orb three"></div>
    </div>

    <main class="page">
        <section class="hero">
            <div class="hero-inner">
                <div class="hero-content">
                    <div class="hero-title-block">
                        <div class="eyebrow">
                            <span class="status-dot"></span>
                            <span data-i18n="hero.eyebrow">Weekly Score Dashboard</span>
                        </div>

                        <h1 data-i18n="hero.title">Coin999-長長久久 隊伍 每週成績總覽</h1>

                        <p class="hero-subtitle" data-i18n="hero.subtitle">
                            檢視每週活動分數、與上週比較，以及本月最後五名。
                        </p>
                    </div>

                    <div class="hero-actions">
                        <div class="select-wrap">
                            <select id="languageSelect" aria-label="Language">
                                <option value="zh-Hant">繁體中文</option>
                                <option value="en">English</option>
                                <option value="vi">Tiếng Việt</option>
                            </select>
                        </div>

                        <div class="select-wrap">
                            <select id="weekSelect" aria-label="選擇週別"
                                data-i18n-attr="aria-label:controls.weekSelectAria"></select>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="stats" id="stats"></section>

        <section class="panel">
            <div class="toolbar">
                <div class="toolbar-left">
                    <div class="input-wrap">
                        <input class="search" id="searchInput" type="search" placeholder="搜尋 CM..."
                            data-i18n-attr="placeholder:controls.searchPlaceholder" />
                    </div>

                    <div class="select-wrap">
                        <select id="statusFilter" aria-label="篩選狀態"
                            data-i18n-attr="aria-label:controls.statusFilterAria">
                            <option value="全部" data-i18n="status.allStatus">全部狀態</option>
                        </select>
                    </div>
                </div>

                <div class="toolbar-right">
                    <span class="hint" id="resultHint" data-i18n="common.loading">載入中...</span>
                </div>
            </div>

            <div class="table-wrap">
                <table>
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <section class="profile-modal" id="profileModal" hidden aria-modal="true" role="dialog"
        aria-labelledby="profileName">
        <div class="profile-backdrop" data-profile-close></div>

        <article class="profile-dialog">
            <header class="profile-head">
                <div>
                    <div class="profile-kicker" data-i18n="profile.kicker">Member Analytics</div>
                    <h2 class="profile-title" id="profileName" data-i18n="profile.title">成員資料</h2>
                    <div class="profile-meta" id="profileMeta" data-i18n="profile.metaLoading">載入中...</div>
                </div>

                <button class="profile-close" id="profileClose" type="button" aria-label="關閉個人資料"
                    data-i18n-attr="aria-label:profile.closeAria">×</button>
            </header>

            <div class="profile-body" id="profileBody">
                <div class="profile-loading" data-i18n="profile.bodyLoading">資料分析中...</div>
            </div>
        </article>
    </section>
</body>

</html>
