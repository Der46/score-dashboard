<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>每週成績總覽</title>
    <style>
        :root {
            --bg: #f4f8ff;
            --text: #102033;
            --muted: #64748b;

            --primary: #2563eb;
            --primary-soft: #eff6ff;
            --primary-border: #bfdbfe;

            --cyan-soft: #ecfeff;

            --green-soft: #ecfdf3;
            --green-border: #bbf7d0;

            --red-soft: #fff1f2;
            --red-border: #fecdd3;

            --orange-soft: #fff7ed;
            --orange-border: #fed7aa;

            --purple-soft: #f5f3ff;
            --purple-border: #ddd6fe;

            --gray-soft: #f8fafc;
            --gray-border: #e2e8f0;

            --shadow: 0 14px 34px rgba(37, 99, 235, 0.1);
            --shadow-soft: 0 8px 20px rgba(15, 23, 42, 0.06);
            --glow: 0 0 0 1px rgba(37, 99, 235, 0.08), 0 14px 36px rgba(37, 99, 235, 0.1);
            --radius: 20px;

            --elder-gold: #d97706;
            --elder-gold-strong: #92400e;
            --elder-gold-soft: #fffbeb;
            --elder-gold-line: rgba(245, 158, 11, 0.72);

            --captain-blue: #1d4ed8;
            --captain-blue-strong: #1e3a8a;
            --captain-blue-soft: #eff6ff;
            --captain-blue-line: rgba(37, 99, 235, 0.78);

            --vice-purple: #7c3aed;
            --vice-purple-strong: #5b21b6;
            --vice-purple-soft: #f5f3ff;
            --vice-purple-line: rgba(124, 58, 237, 0.72);
        }

        /* ================================
Base
================================ */

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            background: var(--bg);
            -webkit-text-size-adjust: 100%;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                "Noto Sans TC",
                "Microsoft JhengHei",
                Arial,
                sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 8% 6%, rgba(14, 165, 233, 0.12), transparent 28%),
                radial-gradient(circle at 92% 12%, rgba(124, 58, 237, 0.1), transparent 30%),
                radial-gradient(circle at 50% 102%, rgba(37, 99, 235, 0.1), transparent 34%),
                linear-gradient(180deg, #f8fbff 0%, #f4f8ff 46%, #eaf2ff 100%);
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -4;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(37, 99, 235, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(37, 99, 235, 0.07) 1px, transparent 1px),
                linear-gradient(rgba(14, 165, 233, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(14, 165, 233, 0.035) 1px, transparent 1px);
            background-size: 48px 48px, 48px 48px, 12px 12px, 12px 12px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.55), transparent 82%);
            opacity: 0.42;
            animation: gridMove 60s linear infinite;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -2;
            pointer-events: none;
            background: linear-gradient(to bottom, transparent 0%, rgba(37, 99, 235, 0.025) 50%, transparent 100%);
            background-size: 100% 9px;
            opacity: 0.18;
            mix-blend-mode: multiply;
        }

        /* ================================
Animations
================================ */

        @keyframes gridMove {
            from {
                background-position: 0 0, 0 0, 0 0, 0 0;
            }

            to {
                background-position: 48px 48px, 48px 48px, 12px 12px, 12px 12px;
            }
        }

        @keyframes floatOrb {

            0%,
            100% {
                transform: translate3d(0, 0, 0) scale(1);
            }

            50% {
                transform: translate3d(18px, -18px, 0) scale(1.03);
            }
        }

        @keyframes shimmer {
            from {
                transform: translateX(-120%);
            }

            to {
                transform: translateX(120%);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes borderScan {
            from {
                transform: translateX(-100%);
            }

            to {
                transform: translateX(100%);
            }
        }

        @keyframes loaderPulse {
            from {
                opacity: 0.45;
                transform: translateY(0);
            }

            to {
                opacity: 1;
                transform: translateY(-4px);
            }
        }

        @keyframes elderSheen {
            from {
                transform: translateX(-130%) skewX(-18deg);
            }

            to {
                transform: translateX(150%) skewX(-18deg);
            }
        }

        @keyframes leaderSheen {
            from {
                transform: translateX(-130%) skewX(-18deg);
            }

            to {
                transform: translateX(150%) skewX(-18deg);
            }
        }

        /* ================================
Ambient Background
================================ */

        .ambient {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: -3;
        }

        .orb {
            position: absolute;
            width: 280px;
            height: 280px;
            border-radius: 999px;
            filter: blur(18px);
            opacity: 0.22;
            animation: floatOrb 18s ease-in-out infinite;
            will-change: transform, opacity;
        }

        .orb.one {
            left: -120px;
            top: 70px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.22), transparent 66%);
        }

        .orb.two {
            right: -120px;
            top: 150px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.16), transparent 68%);
            animation-delay: -3s;
        }

        .orb.three {
            left: 42%;
            bottom: -150px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.16), transparent 68%);
            animation-delay: -5s;
        }

        /* ================================
Layout / Hero
================================ */

        .page {
            width: min(1540px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 54px;
        }

        .hero {
            position: relative;
            overflow: hidden;
            border-radius: 30px;
            padding: 1px;
            box-shadow: var(--shadow);
            isolation: isolate;
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.5), rgba(37, 99, 235, 0.5), rgba(124, 58, 237, 0.34));
        }

        .hero::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 55%;
            height: 2px;
            z-index: 2;
            opacity: 0.55;
            background: linear-gradient(90deg, transparent, rgba(14, 165, 233, 0.88), transparent);
            animation: borderScan 9s ease-in-out infinite;
            will-change: transform, opacity;
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: 1px;
            z-index: -1;
            border-radius: 29px;
            background:
                linear-gradient(90deg, rgba(37, 99, 235, 0.045) 1px, transparent 1px),
                linear-gradient(rgba(37, 99, 235, 0.04) 1px, transparent 1px),
                radial-gradient(circle at 14% 18%, rgba(14, 165, 233, 0.13), transparent 34%),
                radial-gradient(circle at 86% 20%, rgba(124, 58, 237, 0.1), transparent 32%),
                linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(248, 251, 255, 0.9));
            background-size: 34px 34px, 34px 34px, auto, auto, auto;
            backdrop-filter: blur(12px);
        }

        .hero-inner {
            position: relative;
            min-height: 184px;
            padding: 30px;
        }

        .hero-inner::before {
            content: "";
            position: absolute;
            right: 28px;
            top: 28px;
            width: 150px;
            height: 150px;
            border: 1px solid rgba(37, 99, 235, 0.14);
            border-radius: 50%;
            background:
                linear-gradient(90deg, transparent 49%, rgba(37, 99, 235, 0.1) 50%, transparent 51%),
                linear-gradient(transparent 49%, rgba(37, 99, 235, 0.1) 50%, transparent 51%);
            opacity: 0.45;
            pointer-events: none;
        }

        .hero-inner::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.28;
            background: linear-gradient(110deg, transparent 0%, rgba(255, 255, 255, 0.6) 38%, transparent 58%);
            transform: translateX(-120%);
            animation: shimmer 14s ease-in-out infinite;
            will-change: transform, opacity;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 24px;
            flex-wrap: wrap;
        }

        .hero-title-block {
            min-width: 0;
            flex: 1 1 360px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            max-width: 100%;
            padding: 8px 13px;
            margin-bottom: 14px;
            border-radius: 999px;
            border: 1px solid rgba(37, 99, 235, 0.2);
            background: rgba(239, 246, 255, 0.82);
            color: #1d4ed8;
            font-size: 13px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.86), 0 8px 18px rgba(37, 99, 235, 0.06);
            backdrop-filter: blur(8px);
            white-space: nowrap;
        }

        .status-dot {
            flex: 0 0 auto;
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: #10b981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.12), 0 0 12px rgba(16, 185, 129, 0.55);
        }

        h1 {
            margin: 0;
            color: #0f172a;
            font-size: clamp(30px, 4.4vw, 54px);
            line-height: 1.08;
            letter-spacing: -0.052em;
            word-break: keep-all;
        }

        .hero-subtitle {
            margin: 14px 0 0;
            max-width: 720px;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.7;
        }

        .hero-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            flex: 0 1 320px;
        }

        /* ================================
Controls
================================ */

        .select-wrap,
        .input-wrap {
            position: relative;
            min-width: 0;
        }

        select,
        input {
            width: 100%;
            min-height: 46px;
            padding: 12px 14px;
            border: 1px solid rgba(37, 99, 235, 0.18);
            border-radius: 14px;
            outline: none;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(248, 251, 255, 0.92));
            color: var(--text);
            font-size: 14px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9), 0 8px 18px rgba(37, 99, 235, 0.06);
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        select {
            appearance: none;
            padding-right: 42px;
            cursor: pointer;
        }

        select option {
            background: #ffffff;
            color: var(--text);
        }

        .select-wrap::after {
            content: "⌄";
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-56%);
            color: var(--primary);
            pointer-events: none;
            font-size: 18px;
        }

        input::placeholder {
            color: #94a3b8;
        }

        select:focus,
        input:focus {
            border-color: rgba(37, 99, 235, 0.68);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1), 0 10px 22px rgba(37, 99, 235, 0.08);
        }

        select:hover,
        input:hover {
            background: #ffffff;
        }

        .hero select {
            min-width: 270px;
        }

        /* ================================
Stats
================================ */

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            margin-top: 18px;
        }

        .stat-card {
            position: relative;
            overflow: hidden;
            min-width: 0;
            padding: 18px;
            border: 1px solid rgba(37, 99, 235, 0.12);
            border-radius: var(--radius);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(248, 251, 255, 0.82));
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(10px);
            animation: fadeUp 0.28s ease both;
            isolation: isolate;
        }

        .stat-card::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background:
                linear-gradient(90deg, rgba(37, 99, 235, 0.035) 1px, transparent 1px),
                linear-gradient(rgba(37, 99, 235, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 24% 0%, rgba(14, 165, 233, 0.1), transparent 38%);
            background-size: 22px 22px, 22px 22px, auto;
        }

        .stat-card::after {
            content: "";
            position: absolute;
            left: 18px;
            right: 18px;
            bottom: 0;
            height: 2px;
            opacity: 0.65;
            background: linear-gradient(90deg, transparent, rgba(37, 99, 235, 0.54), rgba(14, 165, 233, 0.5), transparent);
        }

        .stat-card.stat-elder {
            border-color: rgba(245, 158, 11, 0.22);
            background: linear-gradient(180deg, rgba(255, 251, 235, 0.92), rgba(236, 254, 255, 0.74));
        }

        .stat-card.stat-elder::after {
            background: linear-gradient(90deg, transparent, rgba(245, 158, 11, 0.68), rgba(14, 165, 233, 0.5), transparent);
        }

        .stat-top {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .stat-label {
            margin-bottom: 10px;
            color: var(--muted);
            font-size: 13px;
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            justify-self: end;
            border-radius: 14px;
            border: 1px solid rgba(37, 99, 235, 0.16);
            background: linear-gradient(135deg, rgba(239, 246, 255, 0.95), rgba(236, 254, 255, 0.85));
            color: var(--primary);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.86), 0 8px 14px rgba(37, 99, 235, 0.06);
        }

        .stat-card.stat-elder .stat-icon {
            color: var(--elder-gold-strong);
            background: linear-gradient(135deg, #fffbeb, #fed7aa, #ecfeff);
            border-color: rgba(245, 158, 11, 0.26);
        }

        .stat-value {
            position: relative;
            z-index: 1;
            min-width: 0;
            max-width: 100%;
            overflow: hidden;
            color: #0f172a;
            font-weight: 950;
            font-size: clamp(20px, 2.1vw, 30px);
            line-height: 1.08;
            letter-spacing: -0.04em;
            font-variant-numeric: tabular-nums;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ================================
Panel / Toolbar / Table
================================ */

        .panel {
            position: relative;
            margin-top: 18px;
            overflow: hidden;
            border-radius: 24px;
            border: 1px solid rgba(37, 99, 235, 0.14);
            background: rgba(255, 255, 255, 0.86);
            box-shadow: var(--glow);
            backdrop-filter: blur(10px);
            isolation: isolate;
            contain: layout paint;
        }

        .panel::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background:
                linear-gradient(90deg, rgba(37, 99, 235, 0.025) 1px, transparent 1px),
                linear-gradient(rgba(37, 99, 235, 0.025) 1px, transparent 1px),
                radial-gradient(circle at 18% 0%, rgba(14, 165, 233, 0.055), transparent 30%),
                radial-gradient(circle at 82% 0%, rgba(124, 58, 237, 0.045), transparent 32%);
            background-size: 28px 28px, 28px 28px, auto, auto;
        }

        .toolbar {
            position: relative;
            z-index: 2;
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            padding: 16px;
            border-bottom: 1px solid rgba(37, 99, 235, 0.12);
            background: rgba(248, 251, 255, 0.78);
            backdrop-filter: blur(10px);
        }

        .toolbar-left,
        .toolbar-right {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            min-width: 0;
        }

        .search {
            min-width: min(390px, 100%);
        }

        .hint {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: 999px;
            border: 1px solid rgba(37, 99, 235, 0.18);
            background: linear-gradient(135deg, rgba(239, 246, 255, 0.92), rgba(236, 254, 255, 0.72));
            color: #334155;
            font-size: 13px;
            line-height: 1.4;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.84);
        }

        .hint::before {
            content: "";
            flex: 0 0 auto;
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1), 0 0 12px rgba(37, 99, 235, 0.35);
        }

        .table-wrap {
            position: relative;
            z-index: 1;
            overflow: auto;
            max-height: 72vh;
            background: rgba(255, 255, 255, 0.86);
            scrollbar-color: rgba(37, 99, 235, 0.42) #eaf2ff;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
            contain: layout paint;
        }

        .table-wrap::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        .table-wrap::-webkit-scrollbar-track {
            background: #eaf2ff;
        }

        .table-wrap::-webkit-scrollbar-thumb {
            border-radius: 999px;
            border: 2px solid #eaf2ff;
            background: linear-gradient(180deg, rgba(37, 99, 235, 0.54), rgba(14, 165, 233, 0.44));
        }

        table {
            width: 100%;
            min-width: 1260px;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 14px;
        }

        thead th {
            position: sticky;
            top: 0;
            z-index: 5;
            padding: 14px 11px;
            border-bottom: 1px solid rgba(37, 99, 235, 0.14);
            background: linear-gradient(180deg, rgba(248, 251, 255, 0.98), rgba(239, 246, 255, 0.94));
            color: #475569;
            text-align: right;
            font-size: 12px;
            letter-spacing: 0.07em;
            white-space: nowrap;
            backdrop-filter: blur(8px);
        }

        thead th:first-child,
        tbody td:first-child {
            position: sticky;
            left: 0;
            z-index: 5;
            min-width: 74px;
            max-width: 74px;
            text-align: center;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 1px 0 0 rgba(37, 99, 235, 0.1);
        }

        thead th:nth-child(2),
        tbody td:nth-child(2) {
            position: sticky;
            left: 74px;
            z-index: 4;
            min-width: 132px;
            max-width: 132px;
            padding-left: 11px;
            text-align: left;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 1px 0 0 rgba(37, 99, 235, 0.1);
        }

        thead th:first-child,
        thead th:nth-child(2) {
            z-index: 8;
            background: linear-gradient(180deg, rgba(248, 251, 255, 1), rgba(239, 246, 255, 0.98));
        }

        tbody tr {
            animation: fadeUp 0.16s ease both;
        }

        .row-no-animation {
            animation: none !important;
        }

        tbody td {
            padding: 13px 11px;
            border-bottom: 1px solid rgba(37, 99, 235, 0.08);
            background: rgba(255, 255, 255, 0.9);
            color: #334155;
            text-align: right;
            white-space: nowrap;
            transition: background 0.16s ease, color 0.16s ease;
        }

        tbody tr:nth-child(even) td {
            background: rgba(248, 251, 255, 0.82);
        }

        tbody tr:hover td,
        tbody tr:hover td:first-child,
        tbody tr:hover td:nth-child(2) {
            background: #edf7ff;
            box-shadow: none;
        }

        /* ================================
Important Columns
================================ */

        thead th.col-pass-distance,
        tbody td.col-pass-distance {
            background: linear-gradient(180deg, rgba(255, 247, 237, 0.98), rgba(255, 237, 213, 0.9)) !important;
            color: #9a3412;
            box-shadow:
                inset 1px 0 0 rgba(251, 146, 60, 0.22),
                inset -1px 0 0 rgba(251, 146, 60, 0.16);
        }

        thead th.col-elder-distance,
        tbody td.col-elder-distance {
            background: linear-gradient(180deg, rgba(255, 251, 235, 0.98), rgba(254, 243, 199, 0.92)) !important;
            color: #92400e;
            box-shadow:
                inset 1px 0 0 rgba(245, 158, 11, 0.26),
                inset -1px 0 0 rgba(245, 158, 11, 0.18);
        }

        thead th.col-pass-distance,
        thead th.col-elder-distance,
        tbody td.col-pass-distance.score,
        tbody td.col-elder-distance.score {
            font-weight: 950;
        }

        tbody tr:hover td.col-pass-distance {
            background: linear-gradient(180deg, rgba(255, 237, 213, 1), rgba(254, 215, 170, 0.94)) !important;
            color: #9a3412;
        }

        tbody tr:hover td.col-elder-distance {
            background: linear-gradient(180deg, rgba(254, 243, 199, 1), rgba(253, 230, 138, 0.94)) !important;
            color: #92400e;
        }

        .row-elder td.col-pass-distance,
        .row-total td.col-pass-distance {
            background: linear-gradient(180deg, rgba(255, 237, 213, 0.98), rgba(254, 215, 170, 0.92)) !important;
            color: #9a3412 !important;
        }

        .row-elder td.col-elder-distance,
        .row-total td.col-elder-distance {
            background: linear-gradient(180deg, rgba(254, 243, 199, 1), rgba(253, 230, 138, 0.9)) !important;
            color: #92400e !important;
        }

        /* ================================
Role Rows
================================ */

        .row-elder td,
        .row-elder td:first-child,
        .row-elder td:nth-child(2) {
            background: linear-gradient(90deg, rgba(255, 251, 235, 0.96), rgba(236, 254, 255, 0.88)) !important;
            border-bottom-color: rgba(245, 158, 11, 0.18);
        }

        .row-elder td:first-child {
            box-shadow:
                1px 0 0 rgba(245, 158, 11, 0.16),
                inset 4px 0 0 var(--elder-gold-line);
        }

        .row-elder:hover td,
        .row-elder:hover td:first-child,
        .row-elder:hover td:nth-child(2) {
            background: linear-gradient(90deg, rgba(255, 247, 237, 0.98), rgba(236, 254, 255, 0.96)) !important;
        }

        .row-captain td,
        .row-captain td:first-child,
        .row-captain td:nth-child(2) {
            background: linear-gradient(90deg, rgba(239, 246, 255, 0.98), rgba(236, 254, 255, 0.9)) !important;
            border-bottom-color: rgba(37, 99, 235, 0.2);
        }

        .row-captain td:first-child {
            box-shadow:
                1px 0 0 rgba(37, 99, 235, 0.16),
                inset 4px 0 0 var(--captain-blue-line);
        }

        .row-captain:hover td,
        .row-captain:hover td:first-child,
        .row-captain:hover td:nth-child(2) {
            background: linear-gradient(90deg, rgba(219, 234, 254, 0.98), rgba(236, 254, 255, 0.96)) !important;
        }

        .row-vice td,
        .row-vice td:first-child,
        .row-vice td:nth-child(2) {
            background: linear-gradient(90deg, rgba(245, 243, 255, 0.98), rgba(239, 246, 255, 0.9)) !important;
            border-bottom-color: rgba(124, 58, 237, 0.18);
        }

        .row-vice td:first-child {
            box-shadow:
                1px 0 0 rgba(124, 58, 237, 0.16),
                inset 4px 0 0 var(--vice-purple-line);
        }

        .row-vice:hover td,
        .row-vice:hover td:first-child,
        .row-vice:hover td:nth-child(2) {
            background: linear-gradient(90deg, rgba(237, 233, 254, 0.98), rgba(239, 246, 255, 0.96)) !important;
        }

        .row-total td,
        .row-total td:first-child,
        .row-total td:nth-child(2) {
            background: linear-gradient(90deg, rgba(219, 234, 254, 0.95), rgba(236, 254, 255, 0.82)) !important;
            color: #1e3a8a;
            font-weight: 950;
            border-bottom: 0;
        }

        .section-row td {
            background: linear-gradient(90deg, rgba(226, 232, 240, 0.95), rgba(239, 246, 255, 0.82)) !important;
            color: #334155;
            font-weight: 950;
            text-align: left;
            font-size: 15px;
            letter-spacing: 0.02em;
        }

        /* ================================
Cells / Badges
================================ */

        .name {
            color: #0f172a;
            font-weight: 850;
        }

        .score {
            color: #1e293b;
            font-weight: 760;
            font-variant-numeric: tabular-nums;
        }

        .rank-cell {
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 34px;
            height: 28px;
            padding: 0 9px;
            border-radius: 999px;
            border: 1px solid rgba(37, 99, 235, 0.22);
            background: linear-gradient(135deg, rgba(239, 246, 255, 0.98), rgba(236, 254, 255, 0.88));
            color: #1d4ed8;
            font-size: 13px;
            font-weight: 950;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.86), 0 6px 14px rgba(37, 99, 235, 0.06);
        }

        .rank-badge-elder {
            color: var(--elder-gold-strong);
            background: linear-gradient(135deg, #fffbeb, #ecfeff);
            border-color: rgba(245, 158, 11, 0.32);
        }

        .rank-badge-captain {
            color: var(--captain-blue-strong);
            background: linear-gradient(135deg, #eff6ff, #dbeafe, #ecfeff);
            border-color: rgba(37, 99, 235, 0.34);
        }

        .rank-badge-vice {
            color: var(--vice-purple-strong);
            background: linear-gradient(135deg, #f5f3ff, #ede9fe, #eff6ff);
            border-color: rgba(124, 58, 237, 0.32);
        }

        .badge,
        .trend-badge,
        .history-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 66px;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid transparent;
            font-size: 12px;
            font-weight: 850;
            letter-spacing: 0.02em;
            font-variant-numeric: tabular-nums;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.78);
        }

        .trend-badge,
        .history-badge {
            min-width: 88px;
        }

        .badge-pass,
        .trend-up {
            color: #166534;
            background: var(--green-soft);
            border-color: var(--green-border);
        }

        .badge-out,
        .trend-down,
        .history-risk {
            color: #be123c;
            background: var(--red-soft);
            border-color: var(--red-border);
        }

        .badge-return {
            color: #6d28d9;
            background: var(--purple-soft);
            border-color: var(--purple-border);
        }

        .badge-leader,
        .trend-new {
            color: #1d4ed8;
            background: var(--primary-soft);
            border-color: var(--primary-border);
        }

        .badge-other,
        .trend-same,
        .history-none {
            color: #475569;
            background: var(--gray-soft);
            border-color: var(--gray-border);
        }

        .history-watch {
            color: #c2410c;
            background: var(--orange-soft);
            border-color: var(--orange-border);
        }

        /* Role badges: static glow + lightweight sheen */
        .badge-elder,
        .badge-captain,
        .badge-vice {
            position: relative;
            overflow: hidden;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.88),
                0 8px 18px rgba(15, 23, 42, 0.06);
        }

        .badge-elder {
            min-width: 78px;
            color: var(--elder-gold-strong);
            border-color: rgba(245, 158, 11, 0.38);
            background:
                radial-gradient(circle at 12% 18%, rgba(255, 255, 255, 0.95), transparent 28%),
                linear-gradient(135deg, rgba(255, 251, 235, 0.98), rgba(254, 215, 170, 0.72), rgba(236, 254, 255, 0.82));
        }

        .badge-captain {
            min-width: 78px;
            color: var(--captain-blue-strong);
            border-color: rgba(37, 99, 235, 0.38);
            background:
                radial-gradient(circle at 12% 18%, rgba(255, 255, 255, 0.95), transparent 28%),
                linear-gradient(135deg, rgba(239, 246, 255, 0.98), rgba(191, 219, 254, 0.8), rgba(236, 254, 255, 0.86));
        }

        .badge-vice {
            min-width: 88px;
            color: var(--vice-purple-strong);
            border-color: rgba(124, 58, 237, 0.36);
            background:
                radial-gradient(circle at 12% 18%, rgba(255, 255, 255, 0.95), transparent 28%),
                linear-gradient(135deg, rgba(245, 243, 255, 0.98), rgba(221, 214, 254, 0.82), rgba(239, 246, 255, 0.86));
        }

        .badge-elder::before,
        .badge-captain::before {
            content: "✦";
            margin-right: 3px;
            font-size: 11px;
            line-height: 1;
        }

        .badge-elder::before {
            color: var(--elder-gold);
        }

        .badge-captain::before {
            color: var(--captain-blue);
        }

        .badge-vice::before {
            content: "◆";
            margin-right: 3px;
            color: var(--vice-purple);
            font-size: 10px;
            line-height: 1;
        }

        .badge-elder::after,
        .badge-captain::after,
        .badge-vice::after {
            content: "";
            position: absolute;
            inset: -30% auto -30% -55%;
            width: 44%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.72), transparent);
            animation: leaderSheen 5.5s ease-in-out infinite;
            will-change: transform;
        }

        .badge-elder::after {
            animation-name: elderSheen;
        }

        /* ================================
Person Link
================================ */

        .person-link {
            appearance: none;
            display: inline-flex;
            align-items: center;
            justify-content: flex-start;
            max-width: 100%;
            margin: 0;
            padding: 0;
            border: 0;
            border-radius: 8px;
            background: transparent;
            color: #0f172a;
            font: inherit;
            font-weight: 900;
            line-height: 1.2;
            text-align: left;
            white-space: nowrap;
            cursor: pointer;
            transition: color 0.16s ease, text-shadow 0.16s ease, transform 0.16s ease;
        }

        .person-link:hover,
        .person-link:focus-visible {
            color: var(--primary);
            text-shadow: 0 0 14px rgba(37, 99, 235, 0.16);
            outline: none;
            transform: translateX(2px);
        }

        .person-link::after {
            content: "↗";
            display: inline-block;
            margin-left: 3px;
            color: var(--primary);
            font-size: 11px;
            opacity: 0.72;
            transform: translateY(-1px);
        }

        .person-link.elder-link {
            color: #78350f;
            text-shadow: 0 0 14px rgba(245, 158, 11, 0.12);
        }

        .person-link.elder-link:hover,
        .person-link.elder-link:focus-visible {
            color: #b45309;
            text-shadow: 0 0 16px rgba(245, 158, 11, 0.24), 0 0 18px rgba(14, 165, 233, 0.14);
        }

        .person-link.captain-link {
            color: #1e3a8a;
            text-shadow: 0 0 14px rgba(37, 99, 235, 0.12);
        }

        .person-link.captain-link:hover,
        .person-link.captain-link:focus-visible {
            color: #2563eb;
            text-shadow: 0 0 16px rgba(37, 99, 235, 0.24), 0 0 18px rgba(14, 165, 233, 0.14);
        }

        .person-link.vice-link {
            color: #5b21b6;
            text-shadow: 0 0 14px rgba(124, 58, 237, 0.12);
        }

        .person-link.vice-link:hover,
        .person-link.vice-link:focus-visible {
            color: #7c3aed;
            text-shadow: 0 0 16px rgba(124, 58, 237, 0.24), 0 0 18px rgba(14, 165, 233, 0.12);
        }

        /* ================================
Empty / Loading
================================ */

        .empty-state {
            padding: 32px !important;
            background: rgba(255, 255, 255, 0.9) !important;
            color: #64748b;
            text-align: left !important;
            line-height: 1.8;
        }

        .loading-row td {
            padding: 30px !important;
            background: rgba(255, 255, 255, 0.9) !important;
            color: var(--muted);
            text-align: left !important;
        }

        .cyber-loader {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .cyber-loader span {
            width: 9px;
            height: 9px;
            border-radius: 999px;
            background: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1), 0 0 12px rgba(37, 99, 235, 0.35);
            animation: loaderPulse 0.9s ease-in-out infinite alternate;
        }

        .cyber-loader span:nth-child(2) {
            animation-delay: 0.15s;
        }

        .cyber-loader span:nth-child(3) {
            animation-delay: 0.3s;
        }

        /* ================================
Profile Modal
================================ */

        body.profile-open {
            overflow: hidden;
        }

        .profile-modal[hidden] {
            display: none;
        }

        .profile-modal {
            position: fixed;
            inset: 0;
            z-index: 80;
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .profile-backdrop {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 10%, rgba(14, 165, 233, 0.16), transparent 34%),
                radial-gradient(circle at 88% 12%, rgba(124, 58, 237, 0.14), transparent 34%),
                rgba(15, 23, 42, 0.42);
            backdrop-filter: blur(8px);
        }

        .profile-dialog {
            position: relative;
            width: min(1040px, 100%);
            max-height: min(86vh, 860px);
            overflow: auto;
            border-radius: 28px;
            border: 1px solid rgba(37, 99, 235, 0.18);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(248, 251, 255, 0.92));
            box-shadow: 0 22px 64px rgba(15, 23, 42, 0.18), 0 0 0 1px rgba(255, 255, 255, 0.62) inset;
            animation: fadeUp 0.2s ease both;
            isolation: isolate;
            contain: layout paint;
        }

        .profile-dialog::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background:
                linear-gradient(90deg, rgba(37, 99, 235, 0.035) 1px, transparent 1px),
                linear-gradient(rgba(37, 99, 235, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 20% 0%, rgba(14, 165, 233, 0.1), transparent 34%),
                radial-gradient(circle at 82% 8%, rgba(124, 58, 237, 0.07), transparent 34%);
            background-size: 28px 28px, 28px 28px, auto, auto;
        }

        .profile-dialog.profile-elder {
            border-color: rgba(245, 158, 11, 0.26);
            box-shadow:
                0 22px 64px rgba(15, 23, 42, 0.18),
                0 0 0 1px rgba(255, 255, 255, 0.68) inset,
                0 0 28px rgba(245, 158, 11, 0.1);
        }

        .profile-head {
            position: sticky;
            top: 0;
            z-index: 4;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            padding: 22px 22px 16px;
            border-bottom: 1px solid rgba(37, 99, 235, 0.12);
            background: rgba(248, 251, 255, 0.88);
            backdrop-filter: blur(10px);
        }

        .profile-kicker {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            color: var(--primary);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .profile-kicker::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: #10b981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1), 0 0 12px rgba(16, 185, 129, 0.42);
        }

        .profile-title {
            margin: 0;
            color: #0f172a;
            font-size: clamp(26px, 4vw, 42px);
            line-height: 1.08;
            letter-spacing: -0.05em;
        }

        .profile-meta {
            margin-top: 8px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        .profile-close {
            flex: 0 0 auto;
            width: 42px;
            height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(37, 99, 235, 0.18);
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(239, 246, 255, 0.86));
            color: #334155;
            cursor: pointer;
            font-size: 22px;
            box-shadow: var(--shadow-soft);
            transition: transform 0.16s ease, border-color 0.16s ease, color 0.16s ease;
        }

        .profile-close:hover {
            transform: translateY(-1px);
            border-color: rgba(37, 99, 235, 0.42);
            color: var(--primary);
        }

        .profile-body {
            padding: 18px 22px 22px;
        }

        .profile-loading,
        .profile-empty {
            padding: 26px;
            border: 1px solid rgba(37, 99, 235, 0.12);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.76);
            color: var(--muted);
            line-height: 1.8;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .profile-stat,
        .profile-section {
            border: 1px solid rgba(37, 99, 235, 0.12);
            background: rgba(255, 255, 255, 0.78);
            box-shadow: var(--shadow-soft);
        }

        .profile-stat {
            position: relative;
            overflow: hidden;
            min-width: 0;
            border-radius: 18px;
            padding: 14px;
        }

        .profile-stat::after {
            content: "";
            position: absolute;
            left: 14px;
            right: 14px;
            bottom: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(37, 99, 235, 0.48), transparent);
        }

        .profile-stat-label {
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 12px;
        }

        .profile-stat-value {
            overflow: hidden;
            color: #0f172a;
            font-size: clamp(19px, 2vw, 27px);
            font-weight: 950;
            letter-spacing: -0.04em;
            font-variant-numeric: tabular-nums;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .profile-stat-note {
            margin-top: 6px;
            color: #64748b;
            font-size: 12px;
            line-height: 1.5;
        }

        .elder-profile-banner {
            position: relative;
            overflow: hidden;
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            gap: 14px;
            align-items: center;
            margin-bottom: 16px;
            padding: 16px;
            border-radius: 20px;
            border: 1px solid rgba(245, 158, 11, 0.24);
            background:
                radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.95), transparent 28%),
                radial-gradient(circle at 86% 18%, rgba(14, 165, 233, 0.11), transparent 34%),
                linear-gradient(135deg, rgba(255, 251, 235, 0.96), rgba(236, 254, 255, 0.84));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9), 0 8px 20px rgba(245, 158, 11, 0.08);
        }

        .elder-profile-banner::after {
            content: "";
            position: absolute;
            inset: -40% auto -40% -50%;
            width: 38%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.62), transparent);
            animation: elderSheen 6s ease-in-out infinite;
            will-change: transform;
        }

        .elder-profile-icon {
            position: relative;
            z-index: 1;
            width: 54px;
            height: 54px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            border: 1px solid rgba(245, 158, 11, 0.28);
            background: linear-gradient(135deg, #fffbeb, #fed7aa, #cffafe);
            color: var(--elder-gold-strong);
            font-size: 26px;
        }

        .elder-profile-title,
        .elder-profile-text,
        .elder-profile-tag {
            position: relative;
            z-index: 1;
        }

        .elder-profile-title {
            color: #78350f;
            font-size: 16px;
            font-weight: 950;
            letter-spacing: -0.02em;
        }

        .elder-profile-text {
            margin-top: 4px;
            color: #64748b;
            font-size: 13px;
            line-height: 1.6;
        }

        .elder-profile-tag {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 11px;
            border-radius: 999px;
            border: 1px solid rgba(14, 165, 233, 0.2);
            background: rgba(236, 254, 255, 0.8);
            color: #0e7490;
            font-size: 12px;
            font-weight: 900;
            white-space: nowrap;
        }

        .profile-section {
            overflow: hidden;
            margin-top: 14px;
            border-radius: 20px;
        }

        .profile-section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(37, 99, 235, 0.1);
            background: rgba(239, 246, 255, 0.72);
        }

        .profile-section-title {
            margin: 0;
            color: #0f172a;
            font-size: 15px;
            font-weight: 950;
        }

        .profile-section-subtitle {
            color: var(--muted);
            font-size: 12px;
        }

        .profile-chart {
            padding: 14px;
            overflow-x: auto;
            contain: content;
        }

        .profile-chart svg {
            display: block;
            width: 100%;
            min-width: 620px;
            height: auto;
        }

        .chart-axis {
            stroke: rgba(100, 116, 139, 0.25);
            stroke-width: 1;
        }

        .chart-grid {
            stroke: rgba(37, 99, 235, 0.09);
            stroke-width: 1;
        }

        .chart-line {
            fill: none;
            stroke: #2563eb;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 6px 8px rgba(37, 99, 235, 0.14));
        }

        .chart-area {
            fill: url(#scoreAreaGradient);
            opacity: 0.85;
        }

        .chart-dot {
            fill: #ffffff;
            stroke: #2563eb;
            stroke-width: 3;
        }

        .chart-dot-empty {
            fill: #e2e8f0;
            stroke: #94a3b8;
            stroke-width: 2;
            opacity: 0.8;
        }

        .chart-label,
        .chart-value {
            fill: #64748b;
            font-size: 12px;
            font-weight: 750;
        }

        .chart-value {
            fill: #1e293b;
            font-size: 11px;
        }

        .profile-timeline {
            display: grid;
            gap: 8px;
            max-height: 260px;
            overflow: auto;
            padding: 14px;
            contain: content;
        }

        .profile-week-row {
            display: grid;
            grid-template-columns: minmax(160px, 1.3fr) repeat(var(--profile-week-columns, 4), minmax(90px, 1fr));
            gap: 10px;
            align-items: center;
            padding: 11px 12px;
            border: 1px solid rgba(37, 99, 235, 0.1);
            border-radius: 14px;
            background: rgba(248, 251, 255, 0.82);
        }

        .profile-week-label {
            color: #0f172a;
            font-weight: 900;
            line-height: 1.4;
        }

        .profile-week-small {
            margin-top: 2px;
            color: var(--muted);
            font-size: 12px;
        }

        .profile-week-score {
            color: #1e293b;
            font-weight: 900;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .profile-week-caption {
            display: block;
            margin-bottom: 3px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
        }

        /* ================================
Responsive
================================ */

        @media (max-width: 960px) {
            .page {
                width: min(100% - 24px, 1540px);
                padding-top: 20px;
            }

            .hero-inner {
                min-height: auto;
                padding: 24px;
            }

            .hero-content {
                align-items: stretch;
            }

            .hero-actions {
                flex: 1 1 100%;
                width: 100%;
            }

            .hero-actions .select-wrap,
            .hero select,
            .toolbar-left,
            .toolbar-right,
            .search,
            .select-wrap,
            .input-wrap,
            select,
            input {
                width: 100%;
            }

            .toolbar {
                align-items: stretch;
            }

            .hint {
                width: 100%;
                justify-content: center;
                border-radius: 14px;
                text-align: center;
