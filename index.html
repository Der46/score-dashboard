<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>每週成績總覽</title>

    <style>
        :root {
            --bg: #050816;
            --card: rgba(15, 23, 42, 0.78);
            --card-strong: rgba(15, 23, 42, 0.95);
            --text: #e5f0ff;
            --muted: #8ea3bd;
            --line: rgba(148, 163, 184, 0.18);
            --cyan: #38bdf8;
            --green: #22c55e;
            --red: #fb7185;
            --orange: #fb923c;
            --purple: #a78bfa;
            --shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
            --radius: 22px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            background: var(--bg);
            -webkit-text-size-adjust: 100%;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                "Noto Sans TC",
                "Microsoft JhengHei",
                Arial,
                sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 8%, rgba(56, 189, 248, 0.24), transparent 30%),
                radial-gradient(circle at 90% 12%, rgba(167, 139, 250, 0.22), transparent 28%),
                radial-gradient(circle at 50% 100%, rgba(34, 197, 94, 0.12), transparent 34%),
                linear-gradient(180deg, #050816 0%, #08111f 52%, #050816 100%);
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -4;
            background-image:
                linear-gradient(rgba(56, 189, 248, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.08) 1px, transparent 1px);
            background-size: 42px 42px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), transparent 88%);
            animation: gridMove 18s linear infinite;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            background:
                linear-gradient(to bottom,
                    transparent 0%,
                    rgba(255, 255, 255, 0.035) 50%,
                    transparent 100%);
            background-size: 100% 8px;
            opacity: 0.25;
            mix-blend-mode: screen;
        }

        @keyframes gridMove {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 42px 42px;
            }
        }

        @keyframes floatOrb {

            0%,
            100% {
                transform: translate3d(0, 0, 0) scale(1);
            }

            50% {
                transform: translate3d(24px, -28px, 0) scale(1.08);
            }
        }

        @keyframes shimmer {
            from {
                transform: translateX(-120%);
            }

            to {
                transform: translateX(120%);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes borderSpin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes loaderPulse {
            from {
                opacity: 0.35;
                transform: translateY(0);
            }

            to {
                opacity: 1;
                transform: translateY(-5px);
            }
        }

        .ambient {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: -3;
        }

        .orb {
            position: absolute;
            width: 360px;
            height: 360px;
            border-radius: 999px;
            filter: blur(18px);
            opacity: 0.5;
            animation: floatOrb 9s ease-in-out infinite;
        }

        .orb.one {
            left: -120px;
            top: 80px;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.42), transparent 64%);
        }

        .orb.two {
            right: -120px;
            top: 160px;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.38), transparent 65%);
            animation-delay: -3s;
        }

        .orb.three {
            left: 42%;
            bottom: -160px;
            background: radial-gradient(circle, rgba(34, 197, 94, 0.22), transparent 66%);
            animation-delay: -5s;
        }

        .page {
            width: min(1540px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 54px;
        }

        .hero {
            position: relative;
            overflow: hidden;
            border-radius: 30px;
            padding: 1px;
            box-shadow: var(--shadow), 0 0 35px rgba(34, 211, 238, 0.18);
            isolation: isolate;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: -42%;
            z-index: -2;
            background:
                conic-gradient(from 180deg,
                    transparent,
                    rgba(56, 189, 248, 0.75),
                    rgba(167, 139, 250, 0.78),
                    rgba(34, 197, 94, 0.42),
                    transparent 62%);
            animation: borderSpin 10s linear infinite;
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: 1px;
            border-radius: 29px;
            z-index: -1;
            background:
                radial-gradient(circle at 14% 20%, rgba(56, 189, 248, 0.24), transparent 34%),
                radial-gradient(circle at 86% 18%, rgba(167, 139, 250, 0.22), transparent 30%),
                linear-gradient(135deg, rgba(15, 23, 42, 0.94), rgba(2, 6, 23, 0.9));
        }

        .hero-inner {
            position: relative;
            padding: 30px;
            min-height: 190px;
        }

        .hero-inner::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(110deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.08) 38%,
                    transparent 58%);
            transform: translateX(-120%);
            animation: shimmer 6s ease-in-out infinite;
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 24px;
            flex-wrap: wrap;
        }

        .hero-title-block {
            min-width: 0;
            flex: 1 1 360px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            max-width: 100%;
            padding: 8px 13px;
            border-radius: 999px;
            border: 1px solid rgba(125, 211, 252, 0.32);
            background: rgba(2, 6, 23, 0.42);
            color: #bae6fd;
            font-size: 13px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            box-shadow: inset 0 0 24px rgba(56, 189, 248, 0.08);
            backdrop-filter: blur(14px);
            margin-bottom: 14px;
            white-space: nowrap;
        }

        .status-dot {
            flex: 0 0 auto;
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: var(--green);
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.95);
        }

        h1 {
            margin: 0;
            font-size: clamp(32px, 4.7vw, 58px);
            line-height: 1.05;
            letter-spacing: -0.06em;
            color: white;
            word-break: keep-all;
        }

        .hero-subtitle {
            margin: 14px 0 0;
            max-width: 720px;
            color: #a8c7e8;
            font-size: 15px;
            line-height: 1.7;
        }

        .hero-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            flex: 0 1 320px;
        }

        .select-wrap,
        .input-wrap {
            position: relative;
            min-width: 0;
        }

        select,
        input {
            width: 100%;
            min-height: 46px;
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 15px;
            outline: none;
            background:
                linear-gradient(180deg, rgba(15, 23, 42, 0.92), rgba(2, 6, 23, 0.82));
            color: var(--text);
            font-size: 14px;
            padding: 12px 14px;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.06),
                0 12px 28px rgba(0, 0, 0, 0.22);
            transition:
                border-color 0.2s ease,
                box-shadow 0.2s ease,
                transform 0.2s ease;
        }

        select {
            appearance: none;
            padding-right: 42px;
            cursor: pointer;
        }

        select option {
            background: #0f172a;
            color: #e5f0ff;
        }

        .select-wrap::after {
            content: "⌄";
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-56%);
            color: #7dd3fc;
            pointer-events: none;
            font-size: 18px;
        }

        input::placeholder {
            color: rgba(148, 163, 184, 0.78);
        }

        select:focus,
        input:focus {
            border-color: rgba(56, 189, 248, 0.72);
            box-shadow:
                0 0 0 4px rgba(56, 189, 248, 0.12),
                0 0 28px rgba(56, 189, 248, 0.16);
        }

        select:hover,
        input:hover {
            transform: translateY(-1px);
        }

        .hero select {
            min-width: 270px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(6, minmax(140px, 1fr));
            gap: 14px;
            margin-top: 18px;
        }

        .stat-card {
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: var(--radius);
            padding: 18px;
            background:
                linear-gradient(180deg, rgba(15, 23, 42, 0.72), rgba(2, 6, 23, 0.72));
            box-shadow:
                0 18px 45px rgba(0, 0, 0, 0.28),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(18px);
            animation: fadeUp 0.5s ease both;
            min-width: 0;
        }

        .stat-card::before {
            content: "";
            position: absolute;
            inset: -1px;
            background:
                radial-gradient(circle at 24% 0%, rgba(56, 189, 248, 0.2), transparent 36%),
                linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent 38%);
            opacity: 0.85;
            pointer-events: none;
        }

        .stat-card::after {
            content: "";
            position: absolute;
            left: 18px;
            right: 18px;
            bottom: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.9), transparent);
            opacity: 0.65;
        }

        .stat-top {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            z-index: 1;
            min-width: 0;
        }

        .stat-label {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 10px;
        }

        .stat-icon {
            flex: 0 0 auto;
            width: 38px;
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            background: rgba(56, 189, 248, 0.1);
            color: #7dd3fc;
            border: 1px solid rgba(125, 211, 252, 0.2);
        }

        .stat-value {
            position: relative;
            z-index: 1;
            color: #f8fafc;
            font-weight: 950;
            font-size: clamp(22px, 2.4vw, 32px);
            letter-spacing: -0.04em;
            font-variant-numeric: tabular-nums;
            overflow-wrap: anywhere;
        }

        .panel {
            position: relative;
            margin-top: 18px;
            overflow: hidden;
            border-radius: 28px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background:
                linear-gradient(180deg, rgba(15, 23, 42, 0.82), rgba(2, 6, 23, 0.84));
            box-shadow: var(--shadow);
            backdrop-filter: blur(20px);
        }

        .panel::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 18% 0%, rgba(56, 189, 248, 0.12), transparent 30%),
                radial-gradient(circle at 82% 0%, rgba(167, 139, 250, 0.1), transparent 32%);
        }

        .toolbar {
            position: relative;
            z-index: 2;
            padding: 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(148, 163, 184, 0.16);
            background: rgba(2, 6, 23, 0.5);
            backdrop-filter: blur(18px);
        }

        .toolbar-left,
        .toolbar-right {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            min-width: 0;
        }

        .search {
            min-width: min(390px, 100%);
        }

        .hint {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #a8c7e8;
            font-size: 13px;
            padding: 10px 12px;
            border-radius: 999px;
            border: 1px solid rgba(125, 211, 252, 0.18);
            background: rgba(56, 189, 248, 0.07);
            line-height: 1.4;
        }

        .hint::before {
            content: "";
            flex: 0 0 auto;
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: var(--cyan);
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.95);
        }

        .table-wrap {
            position: relative;
            z-index: 1;
            overflow: auto;
            max-height: 72vh;
            scrollbar-color: rgba(56, 189, 248, 0.42) rgba(15, 23, 42, 0.8);
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }

        .table-wrap::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        .table-wrap::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.8);
        }

        .table-wrap::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(56, 189, 248, 0.58), rgba(167, 139, 250, 0.55));
            border-radius: 999px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            min-width: 1120px;
            font-size: 14px;
        }

        thead th {
            position: sticky;
            top: 0;
            z-index: 5;
            padding: 14px 11px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(15, 23, 42, 0.96);
            color: #bfe8ff;
            text-align: right;
            font-size: 12px;
            letter-spacing: 0.07em;
            white-space: nowrap;
            backdrop-filter: blur(14px);
        }

        thead th:first-child,
        tbody td:first-child {
            position: sticky;
            left: 0;
            z-index: 4;
            text-align: left;
            min-width: 118px;
            max-width: 118px;
            background: rgba(15, 23, 42, 0.98);
            box-shadow: 1px 0 0 rgba(148, 163, 184, 0.14);
        }

        thead th:nth-child(2),
        tbody td:nth-child(2) {
            position: sticky;
            left: 118px;
            z-index: 4;
            text-align: left;
            min-width: 190px;
            max-width: 190px;
            background: rgba(15, 23, 42, 0.98);
            box-shadow: 1px 0 0 rgba(148, 163, 184, 0.14);
        }

        thead th:first-child,
        thead th:nth-child(2) {
            z-index: 8;
            background: rgba(15, 23, 42, 0.99);
        }

        tbody tr {
            animation: fadeUp 0.34s ease both;
        }

        tbody td {
            padding: 13px 11px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
            text-align: right;
            white-space: nowrap;
            color: #d7e7fb;
            background: rgba(2, 6, 23, 0.42);
            transition:
                background 0.18s ease,
                color 0.18s ease,
                box-shadow 0.18s ease;
        }

        tbody tr:hover td,
        tbody tr:hover td:first-child,
        tbody tr:hover td:nth-child(2) {
            background: rgba(56, 189, 248, 0.08);
            box-shadow: inset 0 1px 0 rgba(125, 211, 252, 0.06);
        }

        .name {
            font-weight: 900;
            color: #f8fafc;
        }

        .line-name {
            color: #b8c7d9;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .score {
            font-variant-numeric: tabular-nums;
            font-weight: 800;
            color: #e6f4ff;
        }

        .badge,
        .trend-badge,
        .history-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 66px;
            padding: 6px 10px;
            border-radius: 999px;
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 0.02em;
            border: 1px solid transparent;
            box-shadow: inset 0 0 16px rgba(255, 255, 255, 0.04);
            font-variant-numeric: tabular-nums;
        }

        .trend-badge,
        .history-badge {
            min-width: 88px;
        }

        .badge-pass {
            color: #86efac;
            background: rgba(34, 197, 94, 0.13);
            border-color: rgba(34, 197, 94, 0.28);
        }

        .badge-out {
            color: #fda4af;
            background: rgba(251, 113, 133, 0.13);
            border-color: rgba(251, 113, 133, 0.28);
        }

        .badge-return {
            color: #c4b5fd;
            background: rgba(167, 139, 250, 0.14);
            border-color: rgba(167, 139, 250, 0.3);
        }

        .badge-leader {
            color: #7dd3fc;
            background: rgba(56, 189, 248, 0.13);
            border-color: rgba(56, 189, 248, 0.32);
        }

        .badge-elder {
            color: #fdba74;
            background: rgba(251, 146, 60, 0.14);
            border-color: rgba(251, 146, 60, 0.3);
        }

        .badge-other {
            color: #cbd5e1;
            background: rgba(148, 163, 184, 0.12);
            border-color: rgba(148, 163, 184, 0.22);
        }

        .trend-up {
            color: #86efac;
            background: rgba(34, 197, 94, 0.14);
            border-color: rgba(34, 197, 94, 0.3);
        }

        .trend-down {
            color: #fda4af;
            background: rgba(251, 113, 133, 0.14);
            border-color: rgba(251, 113, 133, 0.3);
        }

        .trend-same,
        .history-none {
            color: #cbd5e1;
            background: rgba(148, 163, 184, 0.12);
            border-color: rgba(148, 163, 184, 0.22);
        }

        .trend-new {
            color: #7dd3fc;
            background: rgba(56, 189, 248, 0.12);
            border-color: rgba(56, 189, 248, 0.28);
        }

        .history-risk {
            color: #fecdd3;
            background: rgba(251, 113, 133, 0.16);
            border-color: rgba(251, 113, 133, 0.38);
            box-shadow: 0 0 18px rgba(251, 113, 133, 0.16);
        }

        .history-watch {
            color: #fdba74;
            background: rgba(251, 146, 60, 0.14);
            border-color: rgba(251, 146, 60, 0.3);
        }

        .row-total td,
        .row-total td:first-child,
        .row-total td:nth-child(2) {
            background:
                linear-gradient(90deg, rgba(56, 189, 248, 0.24), rgba(167, 139, 250, 0.18)) !important;
            color: #ffffff;
            font-weight: 950;
            border-bottom: 0;
        }

        .section-row td {
            background:
                linear-gradient(90deg, rgba(34, 211, 238, 0.18), rgba(167, 139, 250, 0.12)) !important;
            color: #dff7ff;
            font-weight: 950;
            text-align: left;
            font-size: 15px;
            letter-spacing: 0.03em;
        }

        .empty-state {
            padding: 32px !important;
            color: #a8c7e8;
            text-align: left !important;
            line-height: 1.8;
        }

        .loading-row td {
            padding: 30px !important;
            color: var(--muted);
            text-align: left !important;
        }

        .cyber-loader {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .cyber-loader span {
            width: 9px;
            height: 9px;
            border-radius: 999px;
            background: var(--cyan);
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.95);
            animation: loaderPulse 0.9s ease-in-out infinite alternate;
        }

        .cyber-loader span:nth-child(2) {
            animation-delay: 0.15s;
        }

        .cyber-loader span:nth-child(3) {
            animation-delay: 0.3s;
        }

        @media (max-width: 1280px) {
            .stats {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 960px) {
            .page {
                width: min(100% - 24px, 1540px);
                padding-top: 20px;
            }

            .hero-inner {
                padding: 24px;
                min-height: auto;
            }

            .hero-content {
                align-items: stretch;
            }

            .hero-actions {
                flex: 1 1 100%;
                width: 100%;
            }

            .hero-actions .select-wrap {
                width: 100%;
            }

            .hero select {
                min-width: 100%;
            }

            .toolbar {
                align-items: stretch;
            }

            .toolbar-left,
            .toolbar-right,
            .search,
            .select-wrap,
            .input-wrap,
            select,
            input {
                width: 100%;
            }

            .hint {
                width: 100%;
                justify-content: center;
                border-radius: 15px;
                text-align: center;
            }

            .stats {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 760px) {
            body::before {
                background-size: 34px 34px;
                opacity: 0.65;
            }

            .orb {
                width: 260px;
                height: 260px;
                opacity: 0.36;
            }

            .page {
                width: min(100% - 20px, 1540px);
                padding: 14px 0 34px;
            }

            .hero {
                border-radius: 24px;
            }

            .hero::after {
                border-radius: 23px;
            }

            .hero-inner {
                padding: 20px;
            }

            .eyebrow {
                font-size: 11px;
                letter-spacing: 0.04em;
                padding: 7px 10px;
            }

            h1 {
                font-size: clamp(30px, 10vw, 42px);
                letter-spacing: -0.05em;
            }

            .hero-subtitle {
                font-size: 14px;
                line-height: 1.65;
            }

            .stats {
                grid-template-columns: 1fr;
                gap: 12px;
                margin-top: 14px;
            }

            .stat-card {
                padding: 16px;
                border-radius: 18px;
            }

            .stat-value {
                font-size: 28px;
            }

            .panel {
                margin-top: 14px;
                border-radius: 22px;
                overflow: visible;
            }

            .toolbar {
                padding: 12px;
                border-radius: 22px 22px 0 0;
            }

            .table-wrap {
                overflow: visible;
                max-height: none;
                padding: 12px;
            }

            table {
                display: block;
                width: 100%;
                min-width: 0;
                font-size: 14px;
            }

            thead {
                display: none;
            }

            tbody {
                display: grid;
                gap: 12px;
                width: 100%;

            tbody tr {
                display: block;
                width: 100%;
                border: 1px solid rgba(148, 163, 184, 0.18);
                border-radius: 18px;
                overflow: hidden;
                background:
                    linear-gradient(180deg, rgba(15, 23, 42, 0.84), rgba(2, 6, 23, 0.78));
                box-shadow:
                    0 14px 34px rgba(0, 0, 0, 0.24),
                    inset 0 1px 0 rgba(255, 255, 255, 0.05);
            }

            tbody td,
            thead th:first-child,
            tbody td:first-child,
            thead th:nth-child(2),
            tbody td:nth-child(2) {
                position: static;
                left: auto;
                z-index: auto;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 16px;
                width: 100%;
                min-width: 0;
                max-width: none;
                padding: 12px 14px;
                text-align: right;
                white-space: normal;
                word-break: break-word;
                overflow-wrap: anywhere;
                background: transparent;
                box-shadow: none;
                border-bottom: 1px solid rgba(148, 163, 184, 0.12);

            tbody td:last-child {

            }

            tbody td::before {
                content: attr(data-label);
                flex: 0 0 auto;
                max-width: 46%;
                color: #7dd3fc;
                font-size: 12px;
                font-weight: 800;
                letter-spacing: 0.04em;
                text-align: left;
            }

            tbody tr:hover td,
            tbody tr:hover td:first-child,
            tbody tr:hover td:nth-child(2) {
                background: transparent;
                box-shadow: none;
            }

            .section-row td {
                display: block;
                width: 100%;
                padding: 14px !important;
                text-align: left !important;
                border-bottom: 0;
                border-radius: 18px;
            }

            .section-row td::before {
                display: none;
                content: "";
            }

            .row-total td,
            .row-total td:first-child,
            .row-total td:nth-child(2) {
                background: transparent !important;
                box-shadow: none;
                border-bottom: 1px solid rgba(125, 211, 252, 0.18);
            }

            .empty-state,
            .loading-row td {
                display: block !important;
                border-bottom: 0 !important;
            }

            .empty-state::before,
            .loading-row td::before {
                display: none;
                content: "";
            }

            .cyber-loader {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 420px) {
            .page {
                width: min(100% - 16px, 1540px);
            }

            .hero-inner {
                padding: 16px;
            }

            select,
            input {
                min-height: 44px;
                font-size: 14px;
                border-radius: 13px;
            }

            .toolbar {
                padding: 10px;
            }

            .table-wrap {
                padding: 10px;

            tbody td,
            tbody td:first-child,
            tbody td:nth-child(2) {

                gap: 12px;

            tbody td::before {

                font-size: 11px;

                min-width: auto;
                padding: 6px 9px;
                font-size: 11px;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 0.001ms !important;
            }
        }
    </style>
</head>

<body>
    <div class="ambient" aria-hidden="true">
        <div class="orb one"></div>
        <div class="orb two"></div>
        <div class="orb three"></div>
    </div>

    <main class="page">
        <section class="hero">
            <div class="hero-inner">
                <div class="hero-content">
                    <div class="hero-title-block">
                        <div class="eyebrow">
                            <span class="status-dot"></span>
                            Weekly Score Dashboard
                        </div>

                        <h1>每週成績總覽</h1>

                        <p class="hero-subtitle">
                            檢視每週活動分數、與上週比較，以及歷史最後五名。
                        </p>
                    </div>

                    <div class="hero-actions">
                        <div class="select-wrap">
                            <select id="weekSelect" aria-label="選擇週別"></select>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="stats" id="stats"></section>

        <section class="panel">
            <div class="toolbar">
                <div class="toolbar-left">
                    <div class="input-wrap">
                        <input class="search" id="searchInput" type="search" placeholder="搜尋 CM 或 LINE 名稱..." />
                    </div>

                    <div class="select-wrap">
                        <select id="statusFilter" aria-label="篩選狀態">
                            <option value="全部">全部狀態</option>
                        </select>
                    </div>
                </div>

                <div class="toolbar-right">
                    <span class="hint" id="resultHint">載入中...</span>
                </div>
            </div>

            <div class="table-wrap">
                <table>
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const WEEK_INDEX_URL = "./data/weeks.csv";

        /**
         * 歷史最後五名判定設定：
         *
         * HISTORY_MIN_WEEKS = 至少出現幾週才會被判定為「都後五」
         *
         * HISTORY_MODE:
         * - "appeared"：只看這個人有出現的週數。出現的每一週都在後五名，就算「都後五」。
         * - "allWeeks"：必須每一週都有出現，而且每一週都在後五名，才算「都後五」。
         */
        const HISTORY_MIN_WEEKS = 2;
        const HISTORY_MODE = "appeared";
        const EXCLUDED_STATUSES = ["回歸", "副隊長", "隊長"];


        const DISPLAY_HEADERS = [
            "CM",
            "LINE名稱",
            "活動1總分",
            "活動2總分",
            "活動3總分",
            "一週總分",
            "距離合格分數",
            "距離長老分數",
            "較上週",
            "歷史後五",
            "狀態"
        ];

        const els = {
            weekSelect: document.getElementById("weekSelect"),
            stats: document.getElementById("stats"),
            tableHead: document.getElementById("tableHead"),
            tableBody: document.getElementById("tableBody"),
            searchInput: document.getElementById("searchInput"),
            statusFilter: document.getElementById("statusFilter"),
            resultHint: document.getElementById("resultHint")
        };

        let weeks = [];
        let currentRows = [];
        let historySummaryMap = new Map();

        function escapeHTML(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        async function fetchText(url) {
            const response = await fetch(url, { cache: "no-store" });

            if (!response.ok) {
                throw new Error(`讀取失敗：${url}`);
            }

            return response.text();
        }

        function parseCSV(text) {
            const rows = [];
            let row = [];
            let cell = "";
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (char === '"' && inQuotes && nextChar === '"') {
                    cell += '"';
                    i++;
                    continue;
                }

                if (char === '"') {
                    inQuotes = !inQuotes;
                    continue;
                }

                if (char === "," && !inQuotes) {
                    row.push(cell);
                    cell = "";
                    continue;
                }

                if ((char === "\n" || char === "\r") && !inQuotes) {
                    if (char === "\r" && nextChar === "\n") i++;

                    row.push(cell);

                    if (row.some(value => String(value).trim() !== "")) {
                        rows.push(row);
                    }

                    row = [];
                    cell = "";
                    continue;
                }

                cell += char;
            }

            row.push(cell);

            if (row.some(value => String(value).trim() !== "")) {
                rows.push(row);
            }

            return rows;
        }

        function csvToObjects(csvText) {
            const rows = parseCSV(csvText);

            if (!rows.length) return [];

            const headers = rows[0].map(header => String(header || "").trim());

            return rows.slice(1).map(cols => {
                const obj = {};

                headers.forEach((header, index) => {
                    obj[header] = cols[index] ?? "";
                });

                return obj;
            });
        }

        function parseNumber(value) {
            if (!value) return 0;
            return Number(String(value).replaceAll(",", "").trim()) || 0;
        }

        function formatNumber(value) {
            return Number(value || 0).toLocaleString("zh-TW");
        }

        function isReturnAccount(row) {
            const cm = String(row["CM"] || "").trim();
            const status = String(row["狀態"] || "").trim();

            return (
                row.__isReturnAccount === true ||
                cm === "【回歸帳號】" ||
                status === "回歸"
            );
        }

        function isExcludedFromCalculation(row) {
            const status = String(row["狀態"] || "").trim();

            return (
                isReturnAccount(row) ||
                EXCLUDED_STATUSES.includes(status)
            );
        }

        function isCalculablePerson(row) {
            return row.__type === "person" && !isExcludedFromCalculation(row);
        }

        function getCalculablePeople(rows) {
            return rows.filter(isCalculablePerson);
        }

        function getExcludedPeople(rows) {
            return rows.filter(row => row.__type === "person" && isExcludedFromCalculation(row));
        }

        function getRowType(row) {
            if (row.type) return row.type;
            if (row["CM"] === "【回歸帳號】") return "section";
            if (row["CM"] === "總計") return "total";
            return "person";
        }

        function normalizeRows(rows) {
            let inReturnSection = false;

            return rows
                .map(row => {
                    const normalized = { ...row };

                    DISPLAY_HEADERS.forEach(header => {
                        normalized[header] = normalized[header] ?? "";
                    });

                    normalized.__type = getRowType(normalized);

                    const cm = String(normalized["CM"] || "").trim();
                    const status = String(normalized["狀態"] || "").trim();

                    if (cm === "【回歸帳號】") {
                        inReturnSection = true;
                        normalized.__isReturnAccount = true;
                    } else if (normalized.__type === "section") {
                        inReturnSection = false;
                        normalized.__isReturnAccount = false;
                    } else if (normalized.__type === "person") {
                        normalized.__isReturnAccount = inReturnSection || status === "回歸";
                    } else {
                        normalized.__isReturnAccount = false;
                    }

                    return normalized;
                })
                .filter(row => {
                    if (row.__type !== "person") return true;

                    return (
                        String(row["CM"] || "").trim() ||
                        String(row["LINE名稱"] || "").trim()
                    );
                });
        }

        function getPersonKey(row) {
            if (isExcludedFromCalculation(row)) return "";

            const cm = String(row["CM"] || "").trim();
            const lineName = String(row["LINE名稱"] || "").trim();

            if (cm) return `cm:${cm.toLowerCase()}`;
            if (lineName) return `line:${lineName.toLowerCase()}`;

            return "";
        }

        function getBadgeClass(status) {
            if (status === "PASS") return "badge-pass";
            if (status === "淘汰") return "badge-out";
            if (status === "回歸") return "badge-return";
            if (status === "隊長" || status === "副隊長") return "badge-leader";
            if (status === "長老") return "badge-elder";
            return "badge-other";
        }

        function buildPreviousScoreMap(rows) {
            const map = new Map();

            rows
                .filter(isCalculablePerson)
                .forEach(row => {
                    const key = getPersonKey(row);

                    if (!key) return;

                    map.set(key, parseNumber(row["一週總分"]));
                });

            return map;
        }

        async function getPreviousRows(currentWeekId) {
            const currentIndex = weeks.findIndex(week => week.id === currentWeekId);
            const previousWeek = weeks[currentIndex + 1];

            if (!previousWeek) return [];

            try {
                const csvText = await fetchText(previousWeek.file);
                return normalizeRows(csvToObjects(csvText));
            } catch (error) {
                console.warn("上一週資料讀取失敗：", error);
                return [];
            }
        }

        function applyWeekComparison(rows, previousRows) {
            const previousScoreMap = buildPreviousScoreMap(previousRows);

            return rows.map(row => {
                if (row.__type !== "person") {
                    row["較上週"] = "";
                    row.__trend = "";
                    row.__delta = null;
                    row.__prevScore = null;
                    return row;
                }

                if (isExcludedFromCalculation(row)) {
                    row["較上週"] = "不計算";
                    row.__trend = "same";
                    row.__delta = null;
                    row.__prevScore = null;
                    return row;
                }

                const key = getPersonKey(row);
                const currentScore = parseNumber(row["一週總分"]);

                if (!key || !previousScoreMap.has(key)) {
                    row["較上週"] = "新 / 無資料";
                    row.__trend = "new";
                    row.__delta = null;
                    row.__prevScore = null;
                    return row;
                }

                const previousScore = previousScoreMap.get(key);
                const delta = currentScore - previousScore;

                row.__delta = delta;
                row.__prevScore = previousScore;

                if (delta > 0) {
                    row["較上週"] = `▲ ${formatNumber(delta)}`;
                    row.__trend = "up";
                } else if (delta < 0) {
                    row["較上週"] = `▼ ${formatNumber(Math.abs(delta))}`;
                    row.__trend = "down";
                } else {
                    row["較上週"] = "— 0";
                    row.__trend = "same";
                }

                return row;
            });
        }

        function getBottomFiveKeys(rows) {
            const people = rows
                .filter(isCalculablePerson)
                .map(row => ({
                    key: getPersonKey(row),
                    score: parseNumber(row["一週總分"])
                }))
                .filter(item => item.key);

            if (!people.length) return new Set();

            people.sort((a, b) => a.score - b.score);

            /**
             * 取最後五名。
             * 若第 5 名同分，會一起納入，避免同分者被硬切掉。
             */
            const cutoffIndex = Math.min(4, people.length - 1);
            const cutoffScore = people[cutoffIndex].score;

            return new Set(
                people
                    .filter(item => item.score <= cutoffScore)
                    .map(item => item.key)
            );
        }

        async function loadHistoryBottomFive() {
            const summaryMap = new Map();

            for (const week of weeks) {
                try {
                    const csvText = await fetchText(week.file);
                    const rows = normalizeRows(csvToObjects(csvText));
                    const bottomKeys = getBottomFiveKeys(rows);

                    rows
                        .filter(isCalculablePerson)
                        .forEach(row => {
                            const key = getPersonKey(row);

                            if (!key) return;

                            if (!summaryMap.has(key)) {
                                summaryMap.set(key, {
                                    key,
                                    cm: row["CM"] || "",
                                    lineName: row["LINE名稱"] || "",
                                    weeksSeen: 0,
                                    bottomWeeks: 0,
                                    bottomWeekLabels: []
                                });
                            }

                            const item = summaryMap.get(key);

                            item.weeksSeen += 1;

                            if (bottomKeys.has(key)) {
                                item.bottomWeeks += 1;
                                item.bottomWeekLabels.push(week.label || week.id);
                            }
                        });
                } catch (error) {
                    console.warn(`歷史資料讀取失敗：${week.file}`, error);
                }
            }

            historySummaryMap = summaryMap;
        }

        function isAlwaysHistoricalBottomFive(summary) {
            if (!summary) return false;
            if (summary.weeksSeen < HISTORY_MIN_WEEKS) return false;

            const appearedModePass = summary.bottomWeeks === summary.weeksSeen;
            const allWeeksModePass =
                summary.weeksSeen === weeks.length &&
                summary.bottomWeeks === weeks.length;

            return HISTORY_MODE === "allWeeks"
                ? allWeeksModePass
                : appearedModePass;
        }

        function applyHistoryBottomFive(rows) {
            return rows.map(row => {
                if (row.__type !== "person") {
                    row["歷史後五"] = "";
                    row.__historyLevel = "";
                    row.__historyTitle = "";
                    row.__historyAlways = false;
                    return row;
                }

                if (isExcludedFromCalculation(row)) {
                    const status = String(row["狀態"] || "").trim();

                    row["歷史後五"] = "不計算";
                    row.__historyLevel = "none";
                    row.__historyTitle = `${status || "此帳號"}不納入歷史最後五名統計`;
                    row.__historyAlways = false;
                    return row;
                }

                const key = getPersonKey(row);
                const summary = historySummaryMap.get(key);

                if (!summary) {
                    row["歷史後五"] = "—";
                    row.__historyLevel = "none";
                    row.__historyTitle = "沒有歷史資料";
                    row.__historyAlways = false;
                    return row;
                }

                const alwaysBottomFive = isAlwaysHistoricalBottomFive(summary);

                row.__historyAlways = alwaysBottomFive;
                row.__historyTitle = summary.bottomWeekLabels.length
                    ? `曾在後五名週別：${summary.bottomWeekLabels.join("、")}`
                    : "歷史上沒有進入最後五名";

                if (alwaysBottomFive) {
                    row["歷史後五"] = `都後五 ${summary.bottomWeeks}/${summary.weeksSeen}`;
                    row.__historyLevel = "risk";
                } else if (summary.bottomWeeks > 0) {
                    row["歷史後五"] = `曾後五 ${summary.bottomWeeks}/${summary.weeksSeen}`;
                    row.__historyLevel = "watch";
                } else {
                    row["歷史後五"] = "—";
                    row.__historyLevel = "none";
                }

                return row;
            });
        }

        function renderHead() {
            els.tableHead.innerHTML = `
                <tr>
                    ${DISPLAY_HEADERS.map(header => `<th>${escapeHTML(header)}</th>`).join("")}
                </tr>
            `;
        }

        function renderLoading(message = "資料同步中...") {
            els.tableBody.innerHTML = `
                <tr class="loading-row">
                    <td colspan="${DISPLAY_HEADERS.length}">
                        <span class="cyber-loader">
                            <span></span><span></span><span></span>
                            <strong>${escapeHTML(message)}</strong>
                        </span>
                    </td>
                </tr>
            `;
        }

        function renderWeekSelect() {
            els.weekSelect.innerHTML = weeks
                .map(week => `
                    <option value="${escapeHTML(week.id)}">
                        ${escapeHTML(week.label)}
                    </option>
                `)
                .join("");
        }

        function getFilteredRows() {
            const keyword = els.searchInput.value.trim().toLowerCase();
            const status = els.statusFilter.value;

            return currentRows.filter(row => {
                if (row.__type !== "person") return true;

                const matchKeyword =
                    !keyword ||
                    String(row["CM"]).toLowerCase().includes(keyword) ||
                    String(row["LINE名稱"]).toLowerCase().includes(keyword);

                const matchStatus = status === "全部" || row["狀態"] === status;

                return matchKeyword && matchStatus;
            });
        }

        function renderStatusFilter(rows) {
            const statuses = Array.from(
                new Set(
                    rows
                        .filter(row => row.__type === "person")
                        .map(row => row["狀態"])
                        .filter(Boolean)
                )
            );

            const current = els.statusFilter.value || "全部";

            els.statusFilter.innerHTML = `
                <option value="全部">全部狀態</option>
                ${statuses.map(status => `
                    <option value="${escapeHTML(status)}">${escapeHTML(status)}</option>
                `).join("")}
            `;

            els.statusFilter.value = statuses.includes(current) ? current : "全部";
        }

        function animateNumber(element, target) {
            const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

            if (prefersReducedMotion) {
                element.textContent = formatNumber(target);
                return;
            }

            const duration = 850;
            const startTime = performance.now();

            function update(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                const current = Math.round(target * eased);

                element.textContent = formatNumber(current);

                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }

            requestAnimationFrame(update);
        }

        function animateStatCards() {
            document.querySelectorAll("[data-stat-value]").forEach(element => {
                animateNumber(element, Number(element.dataset.statValue || 0));
            });
        }
        function renderStats(rows) {
            const people = getCalculablePeople(rows);
            const excludedCount = getExcludedPeople(rows).length;

            const totalScore = people.reduce((sum, row) => sum + parseNumber(row["一週總分"]), 0);
            const passCount = people.filter(row => row["狀態"] === "PASS").length;
            const outCount = people.filter(row => row["狀態"] === "淘汰").length;
            const historyRiskCount = people.filter(row => row.__historyAlways).length;

            const statItems = [
                { label: "計算成員筆數", value: people.length, icon: "👥" },
                { label: "一週總分加總", value: totalScore, icon: "⚡" },
                { label: "PASS", value: passCount, icon: "✅" },
                { label: "淘汰", value: outCount, icon: "⛔" },
                { label: "不計算排除", value: excludedCount, icon: "🚫" },
                { label: "歷史都後五", value: historyRiskCount, icon: "⚠" }
            ];

            els.stats.innerHTML = statItems
                .map(item => `
            <article class="stat-card">
                <div class="stat-top">
                    <div>
                        <div class="stat-label">${escapeHTML(item.label)}</div>
                        <div class="stat-value" data-stat-value="${Number(item.value)}">0</div>
                    </div>
                    <div class="stat-icon" aria-hidden="true">${escapeHTML(item.icon)}</div>
                </div>
            </article>
        `)
                .join("");

            animateStatCards();
        }

        function renderBody() {
            const filteredRows = getFilteredRows();

            if (!filteredRows.length) {
                els.tableBody.innerHTML = `
                    <tr>
                        <td class="empty-state" colspan="${DISPLAY_HEADERS.length}">
                            找不到符合條件的資料。
                        </td>
                    </tr>
                `;

                els.resultHint.textContent = "目前顯示 0 筆成員資料";
                return;
            }

            els.tableBody.innerHTML = filteredRows.map((row, index) => {
                if (row.__type === "section") {
                    return `
                        <tr class="section-row" style="animation-delay: ${Math.min(index * 0.015, 0.3)}s">
                            <td colspan="${DISPLAY_HEADERS.length}">📌 ${escapeHTML(row["CM"])}</td>
                        </tr>
                    `;
                }

                const rowClass = row.__type === "total" ? "row-total" : "";

                return `
                    <tr class="${rowClass}" style="animation-delay: ${Math.min(index * 0.015, 0.3)}s">
                        ${DISPLAY_HEADERS.map(header => {
                    const value = row[header] || "";

                    if (header === "CM") {
                        return `<td class="name" data-label="${escapeHTML(header)}">${escapeHTML(value || "-")}</td>`;
                    }

                    if (header === "LINE名稱") {
                        return `<td class="line-name" data-label="${escapeHTML(header)}">${escapeHTML(value || "-")}</td>`;
                    }

                    if (header === "較上週") {
                        const trendClass = row.__trend ? `trend-${row.__trend}` : "trend-same";
                        const prevScoreText =
                            row.__prevScore !== null && row.__prevScore !== undefined
                                ? `上週：${formatNumber(row.__prevScore)}`
                                : "上週無資料";

                        return `
                                    <td class="score" data-label="${escapeHTML(header)}">
                                        <span class="trend-badge ${trendClass}" title="${escapeHTML(prevScoreText)}">
                                            ${escapeHTML(value || "-")}
                                        </span>
                                    </td>
                                `;
                    }

                    if (header === "歷史後五") {
                        const historyClass = row.__historyLevel
                            ? `history-${row.__historyLevel}`
                            : "history-none";

                        return `
                                    <td class="score" data-label="${escapeHTML(header)}">
                                        <span class="history-badge ${historyClass}" title="${escapeHTML(row.__historyTitle || "")}">
                                            ${escapeHTML(value || "-")}
                                        </span>
                                    </td>
                                `;
                    }

                    if (header === "狀態") {
                        return `
                                    <td data-label="${escapeHTML(header)}">
                                        ${value ? `<span class="badge ${getBadgeClass(value)}">${escapeHTML(value)}</span>` : "-"}
                                    </td>
                                `;
                    }

                    return `<td class="score" data-label="${escapeHTML(header)}">${escapeHTML(value || "-")}</td>`;
                }).join("")}
                    </tr>
                `;
            }).join("");

            const shownPeople = filteredRows.filter(isCalculablePerson).length;
            const allPeople = getCalculablePeople(currentRows).length;

            const shownExcludedCount = filteredRows.filter(row => row.__type === "person" && isExcludedFromCalculation(row)).length;
            const allExcludedCount = getExcludedPeople(currentRows).length;

            const historyRiskCount = currentRows.filter(row => isCalculablePerson(row) && row.__historyAlways).length;

            els.resultHint.textContent =
                `目前顯示可計算 ${shownPeople} / ${allPeople} 筆｜不計算排除 ${shownExcludedCount} / ${allExcludedCount} 筆｜歷史都後五 ${historyRiskCount} 人`;
        }

        async function loadWeeks() {
            const csvText = await fetchText(WEEK_INDEX_URL);

            weeks = csvToObjects(csvText).sort((a, b) => {
                return String(b.startDate || "").localeCompare(String(a.startDate || ""));
            });

            renderWeekSelect();
        }

        async function loadWeek(weekId) {
            const week = weeks.find(item => item.id === weekId) || weeks[0];

            if (!week) {
                throw new Error("找不到週別資料");
            }

            els.resultHint.textContent = "資料載入中...";
            renderLoading();

            const csvText = await fetchText(week.file);

            const rows = normalizeRows(csvToObjects(csvText));
            const previousRows = await getPreviousRows(week.id);

            currentRows = applyWeekComparison(rows, previousRows);
            currentRows = applyHistoryBottomFive(currentRows);

            renderHead();
            renderStatusFilter(currentRows);
            renderStats(currentRows);
            renderBody();
        }

        function renderError(error) {
            console.error(error);

            els.stats.innerHTML = "";
            els.resultHint.textContent = "資料讀取失敗";
            els.tableHead.innerHTML = "";

            els.tableBody.innerHTML = `
                <tr>
                    <td class="empty-state" colspan="${DISPLAY_HEADERS.length}">
                        資料讀取失敗，請確認 <strong>data/weeks.csv</strong> 與每週 CSV 檔案路徑是否正確。
                    </td>
                </tr>
            `;
        }

        els.weekSelect.addEventListener("change", async event => {
            try {
                els.searchInput.value = "";
                els.statusFilter.value = "全部";
                await loadWeek(event.target.value);
            } catch (error) {
                renderError(error);
            }
        });

        els.searchInput.addEventListener("input", renderBody);
        els.statusFilter.addEventListener("change", renderBody);

        async function initApp() {
            try {
                renderHead();
                renderLoading("讀取週別資料中...");
                await loadWeeks();

                if (!weeks.length) {
                    throw new Error("weeks.csv 沒有週別資料");
                }

                els.resultHint.textContent = "分析歷史最後五名中...";
                renderLoading("分析歷史最後五名中...");
                await loadHistoryBottomFive();

                await loadWeek(weeks[0].id);
            } catch (error) {
                renderError(error);
            }
        }

        initApp();
    </script>
</body>

</html>
