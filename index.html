<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>每週成績總覽</title>

    <style>
        :root {
            --bg: #f4f8ff;
            --bg-soft: #eef5ff;
            --card: rgba(255, 255, 255, 0.82);
            --card-strong: rgba(255, 255, 255, 0.96);
            --text: #102033;
            --muted: #64748b;
            --muted-soft: #94a3b8;
            --line: rgba(37, 99, 235, 0.13);

            --primary: #2563eb;
            --primary-strong: #1d4ed8;
            --primary-soft: #eff6ff;
            --primary-border: #bfdbfe;

            --cyan: #0891b2;
            --cyan-soft: #ecfeff;
            --cyan-border: #a5f3fc;

            --green: #16a34a;
            --green-soft: #ecfdf3;
            --green-border: #bbf7d0;

            --red: #e11d48;
            --red-soft: #fff1f2;
            --red-border: #fecdd3;

            --orange: #ea580c;
            --orange-soft: #fff7ed;
            --orange-border: #fed7aa;

            --purple: #7c3aed;
            --purple-soft: #f5f3ff;
            --purple-border: #ddd6fe;

            --gray-soft: #f8fafc;
            --gray-border: #e2e8f0;

            --shadow: 0 18px 48px rgba(37, 99, 235, 0.12);
            --shadow-soft: 0 10px 28px rgba(15, 23, 42, 0.08);
            --glow: 0 0 0 1px rgba(37, 99, 235, 0.08), 0 18px 55px rgba(37, 99, 235, 0.12);
            --radius: 20px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            background: var(--bg);
            -webkit-text-size-adjust: 100%;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                "Noto Sans TC",
                "Microsoft JhengHei",
                Arial,
                sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 8% 6%, rgba(14, 165, 233, 0.16), transparent 28%),
                radial-gradient(circle at 92% 12%, rgba(124, 58, 237, 0.13), transparent 30%),
                radial-gradient(circle at 50% 102%, rgba(37, 99, 235, 0.12), transparent 34%),
                linear-gradient(180deg, #f8fbff 0%, #f4f8ff 46%, #eaf2ff 100%);
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -4;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(37, 99, 235, 0.09) 1px, transparent 1px),
                linear-gradient(90deg, rgba(37, 99, 235, 0.09) 1px, transparent 1px),
                linear-gradient(rgba(14, 165, 233, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(14, 165, 233, 0.05) 1px, transparent 1px);
            background-size:
                48px 48px,
                48px 48px,
                12px 12px,
                12px 12px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.6), transparent 82%);
            opacity: 0.82;
            animation: gridMove 24s linear infinite;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -2;
            pointer-events: none;
            background:
                linear-gradient(to bottom,
                    transparent 0%,
                    rgba(37, 99, 235, 0.035) 50%,
                    transparent 100%);
            background-size: 100% 9px;
            opacity: 0.35;
            mix-blend-mode: multiply;
        }

        @keyframes gridMove {
            from {
                background-position: 0 0, 0 0, 0 0, 0 0;
            }

            to {
                background-position: 48px 48px, 48px 48px, 12px 12px, 12px 12px;
            }
        }

        @keyframes floatOrb {

            0%,
            100% {
                transform: translate3d(0, 0, 0) scale(1);
            }

            50% {
                transform: translate3d(22px, -22px, 0) scale(1.05);
            }
        }

        @keyframes shimmer {
            from {
                transform: translateX(-120%);
            }

            to {
                transform: translateX(120%);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes borderScan {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        @keyframes loaderPulse {
            from {
                opacity: 0.45;
                transform: translateY(0);
            }

            to {
                opacity: 1;
                transform: translateY(-4px);
            }
        }

        .ambient {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: -3;
        }

        .orb {
            position: absolute;
            width: 380px;
            height: 380px;
            border-radius: 999px;
            filter: blur(28px);
            opacity: 0.4;
            animation: floatOrb 11s ease-in-out infinite;
        }

        .orb.one {
            left: -150px;
            top: 60px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.24), transparent 66%);
        }

        .orb.two {
            right: -140px;
            top: 150px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.18), transparent 68%);
            animation-delay: -3s;
        }

        .orb.three {
            left: 42%;
            bottom: -180px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.18), transparent 68%);
            animation-delay: -5s;
        }

        .page {
            width: min(1540px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 54px;
        }

        .hero {
            position: relative;
            overflow: hidden;
            border-radius: 30px;
            padding: 1px;
            box-shadow: var(--shadow);
            isolation: isolate;
            background:
                linear-gradient(135deg,
                    rgba(14, 165, 233, 0.58),
                    rgba(37, 99, 235, 0.58),
                    rgba(124, 58, 237, 0.42));
        }

        .hero::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 55%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(14, 165, 233, 0.95), transparent);
            animation: borderScan 4.8s ease-in-out infinite;
            z-index: 2;
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: 1px;
            border-radius: 29px;
            z-index: -1;
            background:
                linear-gradient(90deg, rgba(37, 99, 235, 0.06) 1px, transparent 1px),
                linear-gradient(rgba(37, 99, 235, 0.055) 1px, transparent 1px),
                radial-gradient(circle at 14% 18%, rgba(14, 165, 233, 0.16), transparent 34%),
                radial-gradient(circle at 86% 20%, rgba(124, 58, 237, 0.12), transparent 32%),
                linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(248, 251, 255, 0.9));
            background-size:
                34px 34px,
                34px 34px,
                auto,
                auto,
                auto;
            backdrop-filter: blur(18px);
        }

        .hero-inner {
            position: relative;
            padding: 30px;
            min-height: 184px;
        }

        .hero-inner::before {
            content: "";
            position: absolute;
            right: 28px;
            top: 28px;
            width: 150px;
            height: 150px;
            border: 1px solid rgba(37, 99, 235, 0.16);
            border-radius: 50%;
            background:
                linear-gradient(90deg, transparent 49%, rgba(37, 99, 235, 0.12) 50%, transparent 51%),
                linear-gradient(transparent 49%, rgba(37, 99, 235, 0.12) 50%, transparent 51%);
            opacity: 0.6;
            pointer-events: none;
        }

        .hero-inner::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(110deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.68) 38%,
                    transparent 58%);
            transform: translateX(-120%);
            animation: shimmer 7s ease-in-out infinite;
            pointer-events: none;
            opacity: 0.55;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 24px;
            flex-wrap: wrap;
        }

        .hero-title-block {
            min-width: 0;
            flex: 1 1 360px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            max-width: 100%;
            padding: 8px 13px;
            border-radius: 999px;
            border: 1px solid rgba(37, 99, 235, 0.22);
            background: rgba(239, 246, 255, 0.82);
            color: #1d4ed8;
            font-size: 13px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.9),
                0 8px 22px rgba(37, 99, 235, 0.08);
            backdrop-filter: blur(12px);
            margin-bottom: 14px;
            white-space: nowrap;
        }

        .status-dot {
            flex: 0 0 auto;
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: #10b981;
            box-shadow:
                0 0 0 4px rgba(16, 185, 129, 0.12),
                0 0 14px rgba(16, 185, 129, 0.68);
        }

        h1 {
            margin: 0;
            font-size: clamp(32px, 4.7vw, 56px);
            line-height: 1.05;
            letter-spacing: -0.055em;
            color: #0f172a;
            word-break: keep-all;
        }

        .hero-subtitle {
            margin: 14px 0 0;
            max-width: 720px;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.7;
        }

        .hero-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            flex: 0 1 320px;
        }

        .select-wrap,
        .input-wrap {
            position: relative;
            min-width: 0;
        }

        select,
        input {
            width: 100%;
            min-height: 46px;
            border: 1px solid rgba(37, 99, 235, 0.18);
            border-radius: 14px;
            outline: none;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(248, 251, 255, 0.92));
            color: var(--text);
            font-size: 14px;
            padding: 12px 14px;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.95),
                0 10px 24px rgba(37, 99, 235, 0.07);
            transition:
                border-color 0.2s ease,
                box-shadow 0.2s ease,
                transform 0.2s ease,
                background 0.2s ease;
        }

        select {
            appearance: none;
            padding-right: 42px;
            cursor: pointer;
        }

        select option {
            background: #ffffff;
            color: var(--text);
        }

        .select-wrap::after {
            content: "⌄";
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-56%);
            color: var(--primary);
            pointer-events: none;
            font-size: 18px;
        }

        input::placeholder {
            color: #94a3b8;
        }

        select:focus,
        input:focus {
            border-color: rgba(37, 99, 235, 0.72);
            box-shadow:
                0 0 0 4px rgba(37, 99, 235, 0.12),
                0 12px 28px rgba(37, 99, 235, 0.1);
        }

        select:hover,
        input:hover {
            transform: translateY(-1px);
            background: #ffffff;
        }

        .hero select {
            min-width: 270px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            margin-top: 18px;
        }

        .stat-card {
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(37, 99, 235, 0.12);
            border-radius: var(--radius);
            padding: 18px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(248, 251, 255, 0.82));
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(18px);
            animation: fadeUp 0.42s ease both;
            min-width: 0;
            isolation: isolate;
        }

        .stat-card::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: -1;
            background:
                linear-gradient(90deg, rgba(37, 99, 235, 0.045) 1px, transparent 1px),
                linear-gradient(rgba(37, 99, 235, 0.04) 1px, transparent 1px),
                radial-gradient(circle at 24% 0%, rgba(14, 165, 233, 0.13), transparent 38%),
                linear-gradient(135deg, rgba(255, 255, 255, 0.7), transparent 45%);
            background-size:
                22px 22px,
                22px 22px,
                auto,
                auto;
            pointer-events: none;
        }

        .stat-card::after {
            content: "";
            position: absolute;
            left: 18px;
            right: 18px;
            bottom: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(37, 99, 235, 0.58), rgba(14, 165, 233, 0.56), transparent);
            opacity: 0.75;
        }

        .stat-top {
            position: relative;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: 12px;
            z-index: 1;
            min-width: 0;
        }

        .stat-label {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 10px;
        }

        .stat-icon {
            flex: 0 0 auto;
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            justify-self: end;
            border-radius: 14px;
            background:
                linear-gradient(135deg, rgba(239, 246, 255, 0.95), rgba(236, 254, 255, 0.85));
            color: var(--primary);
            border: 1px solid rgba(37, 99, 235, 0.16);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.9),
                0 10px 18px rgba(37, 99, 235, 0.08);
        }

        .stat-value {
            position: relative;
            z-index: 1;
            color: #0f172a;
            font-weight: 950;
            font-size: clamp(20px, 2.1vw, 30px);
            line-height: 1.08;
            letter-spacing: -0.04em;
            font-variant-numeric: tabular-nums;
            min-width: 0;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .panel {
            position: relative;
            margin-top: 18px;
            overflow: hidden;
            border-radius: 24px;
            border: 1px solid rgba(37, 99, 235, 0.14);
            background: rgba(255, 255, 255, 0.86);
            box-shadow: var(--glow);
            backdrop-filter: blur(18px);
            isolation: isolate;
        }

        .panel::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            background:
                linear-gradient(90deg, rgba(37, 99, 235, 0.035) 1px, transparent 1px),
                linear-gradient(rgba(37, 99, 235, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 18% 0%, rgba(14, 165, 233, 0.07), transparent 30%),
                radial-gradient(circle at 82% 0%, rgba(124, 58, 237, 0.055), transparent 32%);
            background-size:
                28px 28px,
                28px 28px,
                auto,
                auto;
        }

        .toolbar {
            position: relative;
            z-index: 2;
            padding: 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(37, 99, 235, 0.12);
            background: rgba(248, 251, 255, 0.78);
            backdrop-filter: blur(16px);
        }

        .toolbar::after {
            content: "";
            position: absolute;
            left: 16px;
            right: 16px;
            bottom: -1px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(14, 165, 233, 0.6), transparent);
            opacity: 0.65;
            pointer-events: none;
        }

        .toolbar-left,
        .toolbar-right {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            min-width: 0;
        }

        .search {
            min-width: min(390px, 100%);
        }

        .hint {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #334155;
            font-size: 13px;
            padding: 10px 12px;
            border-radius: 999px;
            border: 1px solid rgba(37, 99, 235, 0.18);
            background:
                linear-gradient(135deg, rgba(239, 246, 255, 0.92), rgba(236, 254, 255, 0.72));
            line-height: 1.4;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.88);
        }

        .hint::before {
            content: "";
            flex: 0 0 auto;
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: var(--primary);
            box-shadow:
                0 0 0 4px rgba(37, 99, 235, 0.12),
                0 0 14px rgba(37, 99, 235, 0.45);
        }

        .table-wrap {
            position: relative;
            z-index: 1;
            overflow: auto;
            max-height: 72vh;
            scrollbar-color: rgba(37, 99, 235, 0.45) #eaf2ff;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
            background: rgba(255, 255, 255, 0.86);
        }

        .table-wrap::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        .table-wrap::-webkit-scrollbar-track {
            background: #eaf2ff;
        }

        .table-wrap::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(37, 99, 235, 0.58), rgba(14, 165, 233, 0.48));
            border-radius: 999px;
            border: 2px solid #eaf2ff;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            min-width: 1060px;
            font-size: 14px;
        }

        thead th {
            position: sticky;
            top: 0;
            z-index: 5;
            padding: 14px 11px;
            border-bottom: 1px solid rgba(37, 99, 235, 0.14);
            background:
                linear-gradient(180deg, rgba(248, 251, 255, 0.98), rgba(239, 246, 255, 0.94));
            color: #475569;
            text-align: right;
            font-size: 12px;
            letter-spacing: 0.07em;
            white-space: nowrap;
            backdrop-filter: blur(14px);
        }

        thead th:first-child,
        tbody td:first-child {
            position: sticky;
            left: 0;
            z-index: 5;
            min-width: 74px;
            max-width: 74px;
            text-align: center;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 1px 0 0 rgba(37, 99, 235, 0.12);
        }

        thead th:nth-child(2),
        tbody td:nth-child(2) {
            position: sticky;
            left: 74px;
            z-index: 4;
            text-align: left;
            min-width: 118px;
            max-width: 118px;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 1px 0 0 rgba(37, 99, 235, 0.12);
        }

        thead th:first-child,
        thead th:nth-child(2) {
            z-index: 8;
            background:
                linear-gradient(180deg, rgba(248, 251, 255, 1), rgba(239, 246, 255, 0.98));
        }

        tbody tr {
            animation: fadeUp 0.28s ease both;
        }

        tbody td {
            padding: 13px 11px;
            border-bottom: 1px solid rgba(37, 99, 235, 0.08);
            text-align: right;
            white-space: nowrap;
            color: #334155;
            background: rgba(255, 255, 255, 0.9);
            transition:
                background 0.18s ease,
                color 0.18s ease,
                box-shadow 0.18s ease;
        }

        tbody tr:nth-child(even) td {
            background: rgba(248, 251, 255, 0.82);
        }

        tbody tr:hover td,
        tbody tr:hover td:first-child,
        tbody tr:hover td:nth-child(2) {
            background: #edf7ff;
            box-shadow:
                inset 0 1px 0 rgba(14, 165, 233, 0.08),
                inset 0 -1px 0 rgba(14, 165, 233, 0.08);
        }

        .name {
            font-weight: 850;
            color: #0f172a;
        }

        .line-name {
            color: #475569;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .score {
            font-variant-numeric: tabular-nums;
            font-weight: 760;
            color: #1e293b;
        }

        .rank-cell {
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 34px;
            height: 28px;
            padding: 0 9px;
            border-radius: 999px;
            color: #1d4ed8;
            background:
                linear-gradient(135deg, rgba(239, 246, 255, 0.98), rgba(236, 254, 255, 0.88));
            border: 1px solid rgba(37, 99, 235, 0.22);
            font-size: 13px;
            font-weight: 950;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.9),
                0 8px 18px rgba(37, 99, 235, 0.08);
        }

        .badge,
        .trend-badge,
        .history-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 66px;
            padding: 6px 10px;
            border-radius: 999px;
            font-weight: 850;
            font-size: 12px;
            letter-spacing: 0.02em;
            border: 1px solid transparent;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82);
            font-variant-numeric: tabular-nums;
        }

        .trend-badge,
        .history-badge {
            min-width: 88px;
        }

        .badge-pass {
            color: #166534;
            background: var(--green-soft);
            border-color: var(--green-border);
        }

        .badge-out {
            color: #be123c;
            background: var(--red-soft);
            border-color: var(--red-border);
        }

        .badge-return {
            color: #6d28d9;
            background: var(--purple-soft);
            border-color: var(--purple-border);
        }

        .badge-leader {
            color: #1d4ed8;
            background: var(--primary-soft);
            border-color: var(--primary-border);
        }

        .badge-elder {
            color: #c2410c;
            background: var(--orange-soft);
            border-color: var(--orange-border);
        }

        .badge-other {
            color: #475569;
            background: var(--gray-soft);
            border-color: var(--gray-border);
        }

        .trend-up {
            color: #166534;
            background: var(--green-soft);
            border-color: var(--green-border);
        }

        .trend-down {
            color: #be123c;
            background: var(--red-soft);
            border-color: var(--red-border);
        }

        .trend-same,
        .history-none {
            color: #475569;
            background: var(--gray-soft);
            border-color: var(--gray-border);
        }

        .trend-new {
            color: #1d4ed8;
            background: var(--primary-soft);
            border-color: var(--primary-border);
        }

        const HISTORY_MIN_WEEKS = 2;
        const HISTORY_MODE = "appeared";

        const EXCLUDED_STATUSES = ["回歸", "副隊長", "隊長"];

        };

        const DISPLAY_HEADERS = [

        function escapeHTML(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        async function fetchText(url) {
            const response = await fetch(url, { cache: "no-store" });

            if (!response.ok) {
                throw new Error(`讀取失敗：${url}`);
            }

            return response.text();
        }

        function parseCSV(text) {
            const rows = [];
            let row = [];
            let cell = "";
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (char === '"' && inQuotes && nextChar === '"') {
                    cell += '"';
                    i++;
                    continue;
                }

                if (char === '"') {
                    inQuotes = !inQuotes;
                    continue;
                }

                if (char === "," && !inQuotes) {
                    row.push(cell);
                    cell = "";
                    continue;
                }

                if ((char === "\n" || char === "\r") && !inQuotes) {
                    if (char === "\r" && nextChar === "\n") i++;

                    row.push(cell);

                    if (row.some(value => String(value).trim() !== "")) {
                        rows.push(row);
                    }

                    row = [];
                    cell = "";
                    continue;
                }

                cell += char;
            }

            row.push(cell);

            if (row.some(value => String(value).trim() !== "")) {
                rows.push(row);
            }

            return rows;
        }

        function csvToObjects(csvText) {
            const rows = parseCSV(csvText);

            if (!rows.length) return [];

            const headers = rows[0].map(header => String(header || "").trim());

            return rows.slice(1).map(cols => {
                const obj = {};

                headers.forEach((header, index) => {
                    obj[header] = cols[index] ?? "";
                });

                return obj;
            });
        }

        function parseNumber(value) {
            if (!value) return 0;
            return Number(String(value).replaceAll(",", "").trim()) || 0;
        }

        function formatNumber(value) {
            return Number(value || 0).toLocaleString("zh-TW");
        }

        function formatCompactNumber(value) {
            const number = Number(value || 0);
            const abs = Math.abs(number);

            if (abs >= 100000000) {
                const result = number / 100000000;

                return `${result.toLocaleString("zh-TW", {
                    maximumFractionDigits: 1
                })}億`;
            }

            if (abs >= 10000) {
                const result = number / 10000;

                return `${result.toLocaleString("zh-TW", {
                    maximumFractionDigits: 1
                })}萬`;
            }

            return formatNumber(number);
        }

        function getWeekMonthKey(week) {
            const startDate = String(week?.startDate || "").trim();
            const startDateMatch = startDate.match(/^(\d{4})-(\d{2})/);

            if (startDateMatch) {
                return `${startDateMatch[1]}-${startDateMatch[2]}`;
            }

            const id = String(week?.id || "").trim();
            const idMatch = id.match(/^(\d{4})-(\d{2})/);

            if (idMatch) {
                return `${idMatch[1]}-${idMatch[2]}`;
            }

            return "";
        }

        function formatMonthLabel(monthKey) {
            const [year, month] = String(monthKey || "").split("-");

            if (!year || !month) {
                return "本月";
            }

            return `${year}年${month}月`;
        }

        function getWeeksInSameMonth(targetWeek) {
            const targetMonthKey = getWeekMonthKey(targetWeek);

            if (!targetMonthKey) {
                return [];
            }

            return weeks.filter(week => {
                return getWeekMonthKey(week) === targetMonthKey;
            });
        }

        function getWeekShortLabel(week) {
            const label = String(week?.label || week?.id || "");
            const parts = label.split("｜");

            return parts[0] || label;
        }

        async function getWeekRows(week) {
            if (!week) return [];

            if (weekRowsCache.has(week.id)) {
                return weekRowsCache.get(week.id);
            }

            const csvText = await fetchText(week.file);
            const rows = normalizeRows(csvToObjects(csvText));

            weekRowsCache.set(week.id, rows);

            return rows;
        }

        function cloneRows(rows) {
            return rows.map(row => ({ ...row }));
        }

        function isReturnAccount(row) {
            const cm = String(row["CM"] || "").trim();
            const status = String(row["狀態"] || "").trim();

            return (
                row.__isReturnAccount === true ||
                cm === "【回歸帳號】" ||
                status === "回歸"
            );
        }

        function isExcludedFromCalculation(row) {
            const status = String(row["狀態"] || "").trim();

            return (
                isReturnAccount(row) ||
                EXCLUDED_STATUSES.includes(status)
            );
        }

        function isCalculablePerson(row) {
            return row.__type === "person" && !isExcludedFromCalculation(row);
        }

        function getCalculablePeople(rows) {
            return rows.filter(isCalculablePerson);
        }

        function getExcludedPeople(rows) {
            return rows.filter(row => row.__type === "person" && isExcludedFromCalculation(row));
        }

        function isEverBottomFive(row) {
            return (
                isCalculablePerson(row) &&
                (
                    row.__historyLevel === "watch" ||
                    row.__historyLevel === "risk"
                )
            );
        }

        function getRowType(row) {
            if (row.type) return row.type;
            if (row["CM"] === "【回歸帳號】") return "section";
            if (row["CM"] === "總計") return "total";
            return "person";
        }

        function normalizeRows(rows) {
            let inReturnSection = false;

            return rows
                .map(row => {
                    const normalized = { ...row };

                    DISPLAY_HEADERS.forEach(header => {
                        normalized[header] = normalized[header] ?? "";
                    });

                    normalized.__type = getRowType(normalized);

                    const cm = String(normalized["CM"] || "").trim();
                    const status = String(normalized["狀態"] || "").trim();

                    if (cm === "【回歸帳號】") {
                        inReturnSection = true;
                        normalized.__isReturnAccount = true;
                    } else if (normalized.__type === "section") {
                        inReturnSection = false;
                        normalized.__isReturnAccount = false;
                    } else if (normalized.__type === "person") {
                        normalized.__isReturnAccount = inReturnSection || status === "回歸";
                    } else {
                        normalized.__isReturnAccount = false;
                    }

                    return normalized;
                })
                .filter(row => {
                    if (row.__type !== "person") return true;

                    return (
                        String(row["CM"] || "").trim() ||
                        String(row["LINE名稱"] || "").trim()
                    );
                });
        }

        function normalizeCmName(value) {
            return String(value || "")
                .trim()
                .replace(/\s+/g, " ")
                .toLowerCase();
        }

        function getCmKey(row) {
            const cm = normalizeCmName(row["CM"]);

            return cm ? `cm:${cm}` : "";
        }

        /**
         * 個人資料、歷史紀錄、上週比較全部只使用 CM 比對。
         * 不再使用 LINE名稱，避免不同 CM 共用同一個 LINE名稱 時被誤判為同一人。
         */
        function getProfileKeys(row) {
            const cmKey = getCmKey(row);

            return cmKey ? [cmKey] : [];
        }

        function hasMatchingProfileKey(row, keySet) {
            const cmKey = getCmKey(row);

            return Boolean(cmKey && keySet.has(cmKey));
        }

        function getPersonKey(row) {
            if (isExcludedFromCalculation(row)) return "";

            return getCmKey(row);
        }

        function getBadgeClass(status) {
            if (status === "PASS") return "badge-pass";
            if (status === "淘汰") return "badge-out";
            if (status === "回歸") return "badge-return";
            if (status === "隊長" || status === "副隊長") return "badge-leader";
            if (status === "長老") return "badge-elder";
            return "badge-other";
        }

        function buildPreviousScoreMap(rows) {
            const map = new Map();

            rows
                .filter(isCalculablePerson)
                .forEach(row => {
                    const key = getPersonKey(row);

                    if (!key) return;

                    map.set(key, parseNumber(row["一週總分"]));
                });

            return map;
        }

        async function getPreviousRows(currentWeekId) {
            const currentIndex = weeks.findIndex(week => week.id === currentWeekId);
            const previousWeek = weeks[currentIndex + 1];

            if (!previousWeek) return [];

            try {
                const rows = await getWeekRows(previousWeek);
                return cloneRows(rows);
            } catch (error) {
                console.warn("上一週資料讀取失敗：", error);
                return [];
            }
        }

        function applyWeekComparison(rows, previousRows) {
            const previousScoreMap = buildPreviousScoreMap(previousRows);

            return rows.map(row => {
                if (row.__type !== "person") {
                    row["較上週"] = "";
                    row.__trend = "";
                    row.__delta = null;
                    row.__prevScore = null;
                    return row;
                }

                if (isExcludedFromCalculation(row)) {
                    row["較上週"] = "不計算";
                    row.__trend = "same";
                    row.__delta = null;
                    row.__prevScore = null;
                    return row;
                }

                const key = getPersonKey(row);
                const currentScore = parseNumber(row["一週總分"]);

                if (!key || !previousScoreMap.has(key)) {
                    row["較上週"] = "新 / 無資料";
                    row.__trend = "new";
                    row.__delta = null;
                    row.__prevScore = null;
                    return row;
                }

                const previousScore = previousScoreMap.get(key);
                const delta = currentScore - previousScore;

                row.__delta = delta;
                row.__prevScore = previousScore;

                if (delta > 0) {
                    row["較上週"] = `▲ ${formatNumber(delta)}`;
                    row.__trend = "up";
                } else if (delta < 0) {
                    row["較上週"] = `▼ ${formatNumber(Math.abs(delta))}`;
                    row.__trend = "down";
                } else {
                    row["較上週"] = "— 0";
                    row.__trend = "same";
                }

                return row;
            });
        }

        function getBottomFiveKeys(rows) {
            const people = rows
                .filter(isCalculablePerson)
                .map(row => ({
                    key: getPersonKey(row),
                    score: parseNumber(row["一週總分"])
                }))
                .filter(item => item.key);

            if (!people.length) return new Set();

            people.sort((a, b) => a.score - b.score);

            const cutoffIndex = Math.min(4, people.length - 1);
            const cutoffScore = people[cutoffIndex].score;

            return new Set(
                people
                    .filter(item => item.score <= cutoffScore)
                    .map(item => item.key)
            );
        }

        async function loadHistoryBottomFive(targetWeek) {
            const summaryMap = new Map();
            const monthKey = getWeekMonthKey(targetWeek);
            const monthWeeks = getWeeksInSameMonth(targetWeek);

            historyScopeWeekCount = monthWeeks.length;
            historyScopeLabel = formatMonthLabel(monthKey);

            for (const week of monthWeeks) {
                try {
                    const rows = await getWeekRows(week);
                    const bottomKeys = getBottomFiveKeys(rows);

                    rows
                        .filter(isCalculablePerson)
                        .forEach(row => {
                            const key = getPersonKey(row);

                            if (!key) return;

                            if (!summaryMap.has(key)) {
                                summaryMap.set(key, {
                                    key,
                                    cm: row["CM"] || "",
                                    lineName: row["LINE名稱"] || "",
                                    weeksSeen: 0,
                                    bottomWeeks: 0,
                                    bottomWeekLabels: [],
                                    monthKey,
                                    totalWeeks: monthWeeks.length
                                });
                            }

                            const item = summaryMap.get(key);

                            item.weeksSeen += 1;

                            if (bottomKeys.has(key)) {
                                item.bottomWeeks += 1;
                                item.bottomWeekLabels.push(week.label || week.id);
                            }
                        });
                } catch (error) {
                    console.warn(`本月後五資料讀取失敗：${week.file}`, error);
                }
            }

            historySummaryMap = summaryMap;
        }

        function isAlwaysHistoricalBottomFive(summary) {
            if (!summary) return false;
            if (summary.weeksSeen < HISTORY_MIN_WEEKS) return false;

            const totalWeeks = summary.totalWeeks || historyScopeWeekCount || 0;

            const appearedModePass = summary.bottomWeeks === summary.weeksSeen;

            const allWeeksModePass =
                totalWeeks > 0 &&
                summary.weeksSeen === totalWeeks &&
                summary.bottomWeeks === totalWeeks;

            return HISTORY_MODE === "allWeeks"
                ? allWeeksModePass
                : appearedModePass;
        }

        function applyHistoryBottomFive(rows) {
            return rows.map(row => {
                if (row.__type !== "person") {
                    row[HISTORY_COLUMN] = "";
                    row.__historyLevel = "";
                    row.__historyTitle = "";
                    row.__historyAlways = false;
                    return row;
                }

                if (isExcludedFromCalculation(row)) {
                    const status = String(row["狀態"] || "").trim();

                    row[HISTORY_COLUMN] = "不計算";
                    row.__historyLevel = "none";
                    row.__historyTitle = `${status || "此帳號"}不納入${historyScopeLabel}後五名統計`;
                    row.__historyAlways = false;
                    return row;
                }

                const key = getPersonKey(row);
                const summary = historySummaryMap.get(key);

                if (!summary) {
                    row[HISTORY_COLUMN] = "—";
                    row.__historyLevel = "none";
                    row.__historyTitle = `${historyScopeLabel}沒有資料`;
                    row.__historyAlways = false;
                    return row;
                }

                const alwaysBottomFive = isAlwaysHistoricalBottomFive(summary);

                row.__historyAlways = alwaysBottomFive;
                row.__historyTitle = summary.bottomWeekLabels.length
                    ? `${historyScopeLabel}曾在後五名週別：${summary.bottomWeekLabels.join("、")}`
                    : `${historyScopeLabel}沒有進入最後五名`;

                if (alwaysBottomFive) {
                    row[HISTORY_COLUMN] = `都後五 ${summary.bottomWeeks}/${summary.weeksSeen}`;
                    row.__historyLevel = "risk";
                } else if (summary.bottomWeeks > 0) {
                    row[HISTORY_COLUMN] = `曾後五 ${summary.bottomWeeks}/${summary.weeksSeen}`;
                    row.__historyLevel = "watch";
                } else {
                    row[HISTORY_COLUMN] = "—";
                    row.__historyLevel = "none";
                }

                return row;
            });
        }
        function applyRowNumbers(rows) {
            let normalNumber = 0;
            let returnNumber = 0;
            let inReturnSection = false;

            return rows.map(row => {
                if (row.__type === "section") {
                    const cm = String(row["CM"] || "").trim();

                    if (cm === "【回歸帳號】") {
                        inReturnSection = true;
                        returnNumber = 0;
                    } else {
                        inReturnSection = false;
                    }

                    row.__rank = null;
                    row.__rankTitle = "";
                    row[RANK_COLUMN] = "";

                    return row;
                }

                if (row.__type !== "person") {
                    row.__rank = null;
                    row.__rankTitle = "";
                    row[RANK_COLUMN] = "";

                    return row;
                }

                /**
                 * 編號牌規則：
                 * 1. 不依分數排名
                 * 2. 不管隊長、副隊長、長老、PASS、淘汰等狀態，都照表格順序發號碼
                 * 3. 回歸帳號區塊獨立從 1 開始
                 */
                const number = inReturnSection || isReturnAccount(row)
                    ? ++returnNumber
                    : ++normalNumber;

                row.__rank = number;
                row.__rankTitle = inReturnSection || isReturnAccount(row)
                    ? `回歸帳號編號 ${number}`
                    : `編號 ${number}`;

                row[RANK_COLUMN] = String(number);

                return row;
            });
        }

        function renderHead() {
            els.tableHead.innerHTML = `
            <tr>
                ${DISPLAY_HEADERS.map(header => `<th>${escapeHTML(header)}</th>`).join("")}
            </tr>
        `;

        function renderLoading(message = "資料同步中...") {
            els.tableBody.innerHTML = `
            <tr class="loading-row">
                <td colspan="${DISPLAY_HEADERS.length}">
                    <span class="cyber-loader">

                        <strong>${escapeHTML(message)}</strong>
                    </span>

            </tr>
        `;

        function renderWeekSelect() {
            els.weekSelect.innerHTML = weeks
                .map(week => `
                <option value="${escapeHTML(week.id)}">
                    ${escapeHTML(week.label)}
                </option>
            `)
                .join("");

        function getFilteredRows() {
            const keyword = els.searchInput.value.trim().toLowerCase();
            const status = els.statusFilter.value;

            return currentRows.filter(row => {
                if (row.__type !== "person") return true;

                const matchKeyword =
                    !keyword ||
                    normalizeCmName(row["CM"]).includes(keyword);

                let matchStatus = false;

                if (status === "全部") {
                    matchStatus = true;
                } else if (status === SPECIAL_STATUS_FILTERS.EVER_BOTTOM_FIVE) {
                    matchStatus = isEverBottomFive(row);
                } else {
                    matchStatus = row["狀態"] === status;
                }

                return matchKeyword && matchStatus;
            });
        }

        function renderStatusFilter(rows) {
            const statuses = Array.from(
                new Set(
                    rows
                        .filter(row => row.__type === "person")
                        .map(row => row["狀態"])
                        .filter(Boolean)
                )
            );

            const current = els.statusFilter.value || "全部";

            const specialFilterOptions = `
            <option value="${SPECIAL_STATUS_FILTERS.EVER_BOTTOM_FIVE}">
                曾經最後五
            </option>
        `;

            els.statusFilter.innerHTML = `
        <option value="全部">全部狀態</option>
        ${specialFilterOptions}
        ${statuses.map(status => `
                <option value="${escapeHTML(status)}">${escapeHTML(status)}</option>
            `).join("")}
        `;

            const validValues = [
                "全部",
                SPECIAL_STATUS_FILTERS.EVER_BOTTOM_FIVE,
                ...statuses
            ];

            els.statusFilter.value = validValues.includes(current) ? current : "全部";
        }

        function animateNumber(element, target) {
            const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
            const formatType = element.dataset.format || "normal";
            const formatter = formatType === "compact" ? formatCompactNumber : formatNumber;

            if (prefersReducedMotion) {
                element.textContent = formatter(target);
                element.title = formatNumber(target);
                return;
            }

            const duration = 850;
            const startTime = performance.now();

            function update(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                const current = Math.round(target * eased);

                element.textContent = formatter(current);
                element.title = formatNumber(current);

                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }

            requestAnimationFrame(update);
        }

        function animateStatCards() {
            document.querySelectorAll("[data-stat-value]").forEach(element => {
                animateNumber(element, Number(element.dataset.statValue || 0));
            });
        }

        function renderStats(rows) {

            els.stats.innerHTML = statItems

                            <div
                                class="stat-value"

                                data-format="${escapeHTML(item.format || "normal")}"
                                title="${escapeHTML(formatNumber(item.value))}"
                            >0</div>
                        </div>

                        <div class="stat-icon" aria-hidden="true">
                            ${escapeHTML(item.icon)}
                        </div>
                    </div>
                </article>
            `)
                .join("");

            animateStatCards();

        function renderBody() {
            const filteredRows = getFilteredRows();

            if (!filteredRows.length) {
                els.tableBody.innerHTML = `
                <tr>
                    <td class="empty-state" colspan="${DISPLAY_HEADERS.length}">
                        找不到符合條件的資料。
                    </td>
                </tr>
            `;

                els.resultHint.textContent = "目前顯示 0 筆成員資料";
                return;
            }

            els.tableBody.innerHTML = filteredRows.map((row, index) => {
                if (row.__type === "section") {
                    return `
                    <tr class="section-row" style="animation-delay: ${Math.min(index * 0.015, 0.3)}s">
                        <td colspan="${DISPLAY_HEADERS.length}">📌 ${escapeHTML(row["CM"])}</td>

                `;
                }

                const rowClass = row.__type === "total" ? "row-total" : "";

                return `
                <tr class="${rowClass}" style="animation-delay: ${Math.min(index * 0.015, 0.3)}s">
                    ${DISPLAY_HEADERS.map(header => {

                        if (row.__type === "person" && cmKey) {
                            return `

                                    class="person-link"

                        `;
                        }

                        return `<td class="name" data-label="${escapeHTML(header)}">${escapeHTML(value || "-")}</td>`;
                    }
                    if (header === RANK_COLUMN) {
                        const numberValue = row[RANK_COLUMN] || "";

                        return `
                                <td class="rank-cell" data-label="${escapeHTML(header)}">
                                    ${numberValue
                                ? `<span class="rank-badge" title="${escapeHTML(row.__rankTitle || "")}">
                                                ${escapeHTML(numberValue)}
                                            </span>`
                                : ""
                            }
                                </td>
                            `;
                    }

                    if (header === "較上週") {
                        const trendClass = row.__trend ? `trend-${row.__trend}` : "trend-same";

                        const prevScoreText =
                            row.__prevScore !== null && row.__prevScore !== undefined
                                ? `上週：${formatNumber(row.__prevScore)}`
                                : "上週無資料";

                        return `
                                <td class="score" data-label="${escapeHTML(header)}">
                                    <span class="trend-badge ${trendClass}" title="${escapeHTML(prevScoreText)}">
                                        ${escapeHTML(value || "-")}
                                    </span>
                                </td>
                            `;
                    }

                    if (header === HISTORY_COLUMN) {
                        const historyClass = row.__historyLevel
                            ? `history-${row.__historyLevel}`
                            : "history-none";

                        return `
                                <td class="score" data-label="${escapeHTML(header)}">
                                    <span class="history-badge ${historyClass}" title="${escapeHTML(row.__historyTitle || "")}">
                                        ${escapeHTML(value || "-")}
                                    </span>
                                </td>
                            `;
                    }

                    if (header === "狀態") {
                        return `
                                <td data-label="${escapeHTML(header)}">
                                    ${value ? `<span class="badge ${getBadgeClass(value)}">${escapeHTML(value)}</span>` : "-"}
                                </td>
                            `;
                    }

                    return `<td class="score" data-label="${escapeHTML(header)}">${escapeHTML(value || "-")}</td>`;
                }).join("")}
                </tr>
            `;
            }).join("");

            const shownPeople = filteredRows.filter(isCalculablePerson).length;
            const allPeople = getCalculablePeople(currentRows).length;

            const shownExcludedCount = filteredRows.filter(row => {
                return row.__type === "person" && isExcludedFromCalculation(row);
            }).length;

            const allExcludedCount = getExcludedPeople(currentRows).length;

            const historyRiskCount = currentRows.filter(row => {
                return isCalculablePerson(row) && row.__historyAlways;
            }).length;
            const historyEverCount = currentRows.filter(isEverBottomFive).length;

            els.resultHint.textContent =
                `目前顯示可計算 ${shownPeople} / ${allPeople} 筆｜不計算排除 ${shownExcludedCount} / ${allExcludedCount} 筆｜${historyScopeLabel}曾後五 ${historyEverCount} 人｜都後五 ${historyRiskCount} 人`

        }

        function getScoreRecordsFromRows(row, week) {
            const activity1Raw = String(row["活動1總分"] ?? "").trim();
            const activity2Raw = String(row["活動2總分"] ?? "").trim();
            const activity3Raw = String(row["活動3總分"] ?? "").trim();

            const activity1 = parseNumber(activity1Raw);
            const activity2 = parseNumber(activity2Raw);
            const activity3 = parseNumber(activity3Raw);

            /**
             * 活動 1、活動 2 預設顯示。
             * 活動 3 只有在有填值且不為 0 時才顯示，
             * 避免兩活動週被多顯示一個「活動 3：0」。
             */
            const activities = [
                {
                    label: "活動 1",
                    value: activity1,
                    raw: activity1Raw,
                    show: true
                },
                {
                    label: "活動 2",
                    value: activity2,
                    raw: activity2Raw,
                    show: true
                }
            ];

            if (activity3Raw !== "" && activity3 !== 0) {
                activities.push({
                    label: "活動 3",
                    value: activity3,
                    raw: activity3Raw,
                    show: true
                });
            }

            return {
                weekId: week.id,
                weekLabel: week.label || week.id,
                shortLabel: getWeekShortLabel(week),
                startDate: week.startDate || "",
                monthKey: getWeekMonthKey(week),
                cm: row["CM"] || "",
                lineName: row["LINE名稱"] || "",
                status: row["狀態"] || "",
                activity1,
                activity2,
                activity3,
                activities,
                score: parseNumber(row["一週總分"])
            };
        }

        async function buildMemberProfile(initialKeys) {
            /**
             * 個人頁只接受 cm:* key。
             * 即使舊資料或瀏覽器暫存中帶有 line:*，這裡也會直接忽略。
             */
            const keySet = new Set(
                initialKeys
                    .filter(Boolean)
                    .filter(key => String(key).startsWith("cm:"))
            );

            const records = [];

            if (!keySet.size) {
                const selectedMonthKey = getWeekMonthKey(currentWeek);
                const monthWeeks = getWeeksInSameMonth(currentWeek).reverse();

                return {
                    records: [],
                    monthRecords: monthWeeks.map(week => ({
                        weekId: week.id,
                        weekLabel: week.label || week.id,
                        shortLabel: getWeekShortLabel(week),
                        startDate: week.startDate || "",
                        monthKey: getWeekMonthKey(week),
                        cm: "",
                        lineName: "",
                        status: "無資料",
                        activity1: null,
                        activity2: null,
                        activity3: null,
                        score: null
                    })),
                    selectedMonthKey,
                    selectedMonthLabel: formatMonthLabel(selectedMonthKey)
                };
            }

            const chronologicalWeeks = [...weeks].reverse();

            for (const week of chronologicalWeeks) {
                const rows = await getWeekRows(week);

                const matchedRow = rows.find(row => {
                    return row.__type === "person" && hasMatchingProfileKey(row, keySet);
                });

                if (!matchedRow) continue;

                /**
                 * 不再把 LINE名稱 或其他 key 加入 keySet。
                 * 身分鎖定只看一開始點擊的 CM。
                 */
                records.push(getScoreRecordsFromRows(matchedRow, week));
            }

            const selectedMonthKey = getWeekMonthKey(currentWeek);
            const monthWeeks = getWeeksInSameMonth(currentWeek).reverse();

            const monthRecords = monthWeeks.map(week => {
                const record = records.find(item => item.weekId === week.id);

                if (record) return record;

                return {
                    weekId: week.id,
                    weekLabel: week.label || week.id,
                    shortLabel: getWeekShortLabel(week),
                    startDate: week.startDate || "",
                    monthKey: getWeekMonthKey(week),
                    cm: "",
                    lineName: "",
                    status: "無資料",
                    activity1: null,
                    activity2: null,
                    activity3: null,
                    score: null
                };
            });

            return {
                records,
                monthRecords,
                selectedMonthKey,
                selectedMonthLabel: formatMonthLabel(selectedMonthKey)
            };
        }

        function calculateAverage(values) {
            const validValues = values.filter(value => Number.isFinite(value));

            if (!validValues.length) return 0;

            return Math.round(
                validValues.reduce((sum, value) => sum + value, 0) / validValues.length
            );
        }

        function getProfileSummary(profile) {
            const records = profile.records;
            const validScores = records.map(record => record.score).filter(Number.isFinite);

            const bestRecord = records.reduce((best, record) => {
                if (!best) return record;
                return record.score > best.score ? record : best;
            }, null);

            const latestRecord = records[records.length - 1] || null;
            const previousRecord = records[records.length - 2] || null;

            const monthValidRecords = profile.monthRecords.filter(record => Number.isFinite(record.score));
            const monthScores = monthValidRecords.map(record => record.score);
            const monthTotal = monthScores.reduce((sum, score) => sum + score, 0);
            const monthAverage = calculateAverage(monthScores);

            const firstMonthRecord = monthValidRecords[0] || null;
            const lastMonthRecord = monthValidRecords[monthValidRecords.length - 1] || null;

            const monthDelta =
                firstMonthRecord && lastMonthRecord
                    ? lastMonthRecord.score - firstMonthRecord.score
                    : null;

            const latestDelta =
                latestRecord && previousRecord
                    ? latestRecord.score - previousRecord.score
                    : null;

            return {
                totalWeeks: records.length,
                bestRecord,
                latestRecord,
                previousRecord,
                averageScore: calculateAverage(validScores),
                monthTotal,
                monthAverage,
                monthDelta,
                latestDelta
            };
        }

        function formatDelta(delta) {
            if (delta === null || delta === undefined) return "無資料";
            if (delta > 0) return `▲ ${formatNumber(delta)}`;
            if (delta < 0) return `▼ ${formatNumber(Math.abs(delta))}`;
            return "— 0";
        }

        function renderProfileChart(monthRecords) {
            const width = 760;
            const height = 280;
            const padding = {
                top: 32,
                right: 26,
                bottom: 52,
                left: 70
            };

            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;

            const validScores = monthRecords
                .map(record => record.score)
                .filter(Number.isFinite);

            if (!validScores.length) {
                return `
                <div class="profile-empty">
                    這個月份沒有可繪製的分數資料。
                </div>
            `;
            }

            const maxScore = Math.max(...validScores, 1);
            const niceMax = Math.ceil(maxScore / 100000) * 100000 || maxScore;

            const getX = index => {
                if (monthRecords.length <= 1) {
                    return padding.left + chartWidth / 2;
                }

                return padding.left + (index / (monthRecords.length - 1)) * chartWidth;
            };

            const getY = score => {
                return padding.top + (1 - score / niceMax) * chartHeight;
            };

            const points = monthRecords.map((record, index) => {
                const hasScore = Number.isFinite(record.score);

                return {
                    ...record,
                    index,
                    hasScore,
                    x: getX(index),
                    y: hasScore ? getY(record.score) : padding.top + chartHeight
                };
            });

            const validPoints = points.filter(point => point.hasScore);

            const linePath = validPoints
                .map((point, index) => `${index === 0 ? "M" : "L"} ${point.x} ${point.y}`)
                .join(" ");

            const areaPath = validPoints.length
                ? `${linePath} L ${validPoints[validPoints.length - 1].x} ${padding.top + chartHeight} L ${validPoints[0].x} ${padding.top + chartHeight} Z`
                : "";

            const gridLines = [0, 0.25, 0.5, 0.75, 1].map(ratio => {
                const y = padding.top + ratio * chartHeight;
                const value = Math.round(niceMax * (1 - ratio));

                return `
                <line class="chart-grid" x1="${padding.left}" y1="${y}" x2="${width - padding.right}" y2="${y}"></line>
                <text class="chart-label" x="${padding.left - 12}" y="${y + 4}" text-anchor="end">
                    ${formatCompactNumber(value)}
                </text>
            `;
            }).join("");

            const dots = points.map(point => {
                const label = escapeHTML(point.shortLabel);
                const value = point.hasScore ? formatNumber(point.score) : "無資料";

                if (!point.hasScore) {
                    return `
                    <circle class="chart-dot-empty" cx="${point.x}" cy="${point.y}" r="5">
                        <title>${label}：無資料</title>
                    </circle>
                    <text class="chart-label" x="${point.x}" y="${height - 24}" text-anchor="middle">${label}</text>
                `;
                }

                return `
                <circle class="chart-dot" cx="${point.x}" cy="${point.y}" r="6">
                    <title>${label}：${value}</title>
                </circle>
                <text class="chart-value" x="${point.x}" y="${point.y - 12}" text-anchor="middle">${formatCompactNumber(point.score)}</text>
                <text class="chart-label" x="${point.x}" y="${height - 24}" text-anchor="middle">${label}</text>
            `;
            }).join("");

            return `
            <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="本月分數折線圖">
                <defs>
                    <linearGradient id="scoreAreaGradient" x1="0" x2="0" y1="0" y2="1">
                        <stop offset="0%" stop-color="rgba(37, 99, 235, 0.22)"></stop>
                        <stop offset="100%" stop-color="rgba(14, 165, 233, 0.02)"></stop>
                    </linearGradient>
                </defs>

                ${gridLines}

                <line class="chart-axis" x1="${padding.left}" y1="${padding.top + chartHeight}" x2="${width - padding.right}" y2="${padding.top + chartHeight}"></line>
                <line class="chart-axis" x1="${padding.left}" y1="${padding.top}" x2="${padding.left}" y2="${padding.top + chartHeight}"></line>

                ${areaPath ? `<path class="chart-area" d="${areaPath}"></path>` : ""}
                ${linePath ? `<path class="chart-line" d="${linePath}"></path>` : ""}

                ${dots}
            </svg>
        `;
        }
        function getRecordActivities(record) {
            if (Array.isArray(record.activities) && record.activities.length) {
                return record.activities.filter(activity => activity.show !== false);
            }

            const activities = [
                {
                    label: "活動 1",
                    value: record.activity1,
                    show: true
                },
                {
                    label: "活動 2",
                    value: record.activity2,
                    show: true
                }
            ];

            if (Number.isFinite(record.activity3) && record.activity3 !== 0) {
                activities.push({
                    label: "活動 3",
                    value: record.activity3,
                    show: true
                });
            }

            return activities;
        }

        function renderProfileTimeline(records) {
            if (!records.length) {
                return `
                <div class="profile-empty">
                    查無這位成員的週別紀錄。
                </div>
            `;
            }

            return records
                .slice()
                .reverse()
                .map(record => {
                    const activities = getRecordActivities(record);

                    /**
                     * 欄位數計算：
                     * - 一週總分：1 欄
                     * - 活動欄位：activities.length 欄
                     * - 狀態：1 欄
                     *
                     * 左側週別資訊是固定第一欄，所以這裡只控制後面的 repeat 欄位數。
                     */
                    const dynamicColumnCount = activities.length + 2;

                    const activityHTML = activities
                        .map(activity => `
                    <div class="profile-week-score">
                        <span class="profile-week-caption">${escapeHTML(activity.label)}</span>
                        ${formatNumber(activity.value)}
                    </div>
                `)
                        .join("");

                    return `
                <div class="profile-week-row" style="--profile-week-columns: ${dynamicColumnCount}">
                    <div>
                        <div class="profile-week-label">${escapeHTML(record.weekLabel)}</div>
                        <div class="profile-week-small">${escapeHTML(record.startDate || "未提供日期")}</div>
                    </div>

                    <div class="profile-week-score">
                        <span class="profile-week-caption">一週總分</span>
                        ${formatNumber(record.score)}
                    </div>

                    ${activityHTML}

                    <div class="profile-week-score">
                        <span class="profile-week-caption">狀態</span>
                        <span class="badge ${getBadgeClass(record.status)}">${escapeHTML(record.status || "-")}</span>
                    </div>
                </div>
            `;
                })
                .join("");
        }

        function renderMemberProfile(profile) {
            const summary = getProfileSummary(profile);

            if (!profile.records.length) {
                els.profileName.textContent = "查無成員資料";
                els.profileMeta.textContent = "沒有找到對應的歷史紀錄。";
                els.profileBody.innerHTML = `
                <div class="profile-empty">
                    找不到這位成員的歷史資料。
                </div>
            `;
                return;
            }

            const latestRecord = summary.latestRecord;
            const bestRecord = summary.bestRecord;

            const displayName = latestRecord.cm || latestRecord.lineName || "未命名成員";

            els.profileName.textContent = displayName;
            els.profileMeta.textContent =
                `共出現 ${summary.totalWeeks} 週｜最新狀態：${latestRecord.status || "未標記"}｜${profile.selectedMonthLabel}走勢分析`;

            els.profileBody.innerHTML = `
            <div class="profile-grid">
                <article class="profile-stat">
                    <div class="profile-stat-label">歷史最高分</div>
                    <div class="profile-stat-value">${formatNumber(bestRecord.score)}</div>
                    <div class="profile-stat-note">${escapeHTML(bestRecord.weekLabel)}</div>
                </article>

                <article class="profile-stat">
                    <div class="profile-stat-label">歷史平均分</div>
                    <div class="profile-stat-value">${formatNumber(summary.averageScore)}</div>
                    <div class="profile-stat-note">依出現週數平均</div>
                </article>

                <article class="profile-stat">
                    <div class="profile-stat-label">${escapeHTML(profile.selectedMonthLabel)}總分</div>
                    <div class="profile-stat-value">${formatNumber(summary.monthTotal)}</div>
                    <div class="profile-stat-note">本月已出現週別加總</div>
                </article>

                <article class="profile-stat">
                    <div class="profile-stat-label">本月走勢</div>
                    <div class="profile-stat-value">${escapeHTML(formatDelta(summary.monthDelta))}</div>
                    <div class="profile-stat-note">以本月第一筆與最後一筆比較</div>
                </article>
            </div>

            <section class="profile-section">
                <div class="profile-section-head">
                    <h3 class="profile-section-title">${escapeHTML(profile.selectedMonthLabel)}分數折線圖</h3>
                    <span class="profile-section-subtitle">顯示目前選取月份的每週總分</span>
                </div>

                <div class="profile-chart">
                    ${renderProfileChart(profile.monthRecords)}
                </div>
            </section>

            <section class="profile-section">
                <div class="profile-section-head">
                    <h3 class="profile-section-title">歷史週別紀錄</h3>
                    <span class="profile-section-subtitle">最新週別在最上方</span>
                </div>

                <div class="profile-timeline">
                    ${renderProfileTimeline(profile.records)}
                </div>
            </section>
        `;
        }

        function openProfileModal() {
            els.profileModal.hidden = false;
            document.body.classList.add("profile-open");
        }

        function closeProfileModal() {
            els.profileModal.hidden = true;
            document.body.classList.remove("profile-open");
        }

        async function openMemberProfile(profileKeyValue) {
            const initialKeys = String(profileKeyValue || "")
                .split("|")
                .map(key => key.trim())
                .filter(Boolean);

            if (!initialKeys.length) return;

            openProfileModal();

            els.profileName.textContent = "成員資料";
            els.profileMeta.textContent = "資料分析中...";
            els.profileBody.innerHTML = `
            <div class="profile-loading">
                正在彙整歷史最高分、本月折線圖與週別紀錄...
            </div>
        `;

            try {
                const profile = await buildMemberProfile(initialKeys);
                renderMemberProfile(profile);
            } catch (error) {
                console.error(error);

                els.profileName.textContent = "資料讀取失敗";
                els.profileMeta.textContent = "個人資料分析時發生錯誤。";
                els.profileBody.innerHTML = `
                <div class="profile-empty">
                    個人資料讀取失敗，請確認每週 CSV 檔案是否都能正常讀取。
                </div>
            `;
            }
        }

        async function loadWeeks() {
            const csvText = await fetchText(WEEK_INDEX_URL);

            weeks = csvToObjects(csvText).sort((a, b) => {
                return String(b.startDate || "").localeCompare(String(a.startDate || ""));
            });

            renderWeekSelect();
        }

        async function loadWeek(weekId) {
            const week = weeks.find(item => item.id === weekId) || weeks[0];

            if (!week) {
                throw new Error("找不到週別資料");
            }

            currentWeek = week;

            els.resultHint.textContent = "資料載入中...";
            renderLoading();

            const rows = cloneRows(await getWeekRows(week));
            const previousRows = await getPreviousRows(week.id);

            els.resultHint.textContent = "分析本月後五名中...";
            renderLoading("分析本月後五名中...");
            await loadHistoryBottomFive(week);

            currentRows = applyWeekComparison(rows, previousRows);
            currentRows = applyHistoryBottomFive(currentRows);
            currentRows = applyRowNumbers(currentRows);


            renderHead();
            renderStatusFilter(currentRows);
            renderStats(currentRows);
            renderBody();
        }

        function renderError(error) {
            console.error(error);

            els.stats.innerHTML = "";
            els.resultHint.textContent = "資料讀取失敗";
            els.tableHead.innerHTML = "";

            els.tableBody.innerHTML = `
            <tr>
                <td class="empty-state" colspan="${DISPLAY_HEADERS.length}">
                    資料讀取失敗，請確認 <strong>data/weeks.csv</strong> 與每週 CSV 檔案路徑是否正確。
                </td>
            </tr>
        `;
        }

        els.weekSelect.addEventListener("change", async event => {
            try {
                els.searchInput.value = "";
                els.statusFilter.value = "全部";
                await loadWeek(event.target.value);
            } catch (error) {
                renderError(error);
            }
        });

        els.searchInput.addEventListener("input", renderBody);
        els.statusFilter.addEventListener("change", renderBody);

        els.tableBody.addEventListener("click", event => {
            const button = event.target.closest("[data-profile-keys]");

            if (!button) return;

            openMemberProfile(button.dataset.profileKeys || "");
        });

        els.profileClose.addEventListener("click", closeProfileModal);

        els.profileModal.addEventListener("click", event => {
            if (event.target.matches("[data-profile-close]")) {
                closeProfileModal();
            }
        });

        document.addEventListener("keydown", event => {
            if (event.key === "Escape" && !els.profileModal.hidden) {
                closeProfileModal();
            }
        });

        async function initApp() {
            try {
                renderHead();
                renderLoading("讀取週別資料中...");
                await loadWeeks();

                if (!weeks.length) {
                    throw new Error("weeks.csv 沒有週別資料");
                }

                await loadWeek(weeks[0].id);
            } catch (error) {
                renderError(error);
            }
        }

        initApp();
    </script>
</body>

</html>
